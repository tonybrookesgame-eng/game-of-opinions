<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Game of Opinions</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #020611;
      color: white;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: url('managers office.png') no-repeat center center;
      background-size: cover;
    }
    .auth-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .whiteboard-login {
      width: 100%;
      max-width: 420px;
      background: linear-gradient(180deg, #176d2c 0%, #0f5a22 100%);
      padding: 40px;
      border-radius: 12px;
      border: 8px solid #fff;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      position: relative;
      text-align: center;
    }
    .pitch-markings::before {
      content: "";
      position: absolute;
      top: 50%; left: 0; width: 100%; height: 2px;
      background: rgba(255,255,255,0.3);
    }
    .pitch-markings::after {
      content: "";
      position: absolute;
      top: 50%; left: 50%; width: 100px; height: 100px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }
    h2 {
      position: relative;
      font-size: 24px;
      text-transform: uppercase;
      font-weight: 900;
      border-bottom: 2px solid #c7ff38;
      padding-bottom: 12px;
      margin-bottom: 25px;
    }
    .auth-input {
      position: relative;
      z-index: 2;
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: #1e293b;
      color: white;
      font-size: 16px;
    }
    .auth-submit-btn {
      position: relative;
      z-index: 2;
      width: 100%;
      background: #c7ff38;
      color: #041102;
      padding: 14px;
      border-radius: 999px;
      border: none;
      font-weight: 800;
      cursor: pointer;
      margin-top: 10px;
    }
    .auth-submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(199,255,56,0.3);
    }
    a { color: #c7ff38; text-decoration: none; font-weight: bold; }
  </style>
</head>
<body>
  <div class="auth-overlay">
    <div class="whiteboard-login">
      <div class="pitch-markings"></div>
      <h2>Manager Registration</h2>
      <p style="position: relative; z-index: 2; font-weight: 700; margin-bottom: 20px; font-size: 14px;">Apply for your coaching badges here.</p>
      
      <input id="email" class="auth-input" type="email" placeholder="Email Address">
      <input id="password" class="auth-input" type="password" placeholder="Create Password">
      
      <button class="auth-submit-btn" onclick="handleSignup()">Finalize Application</button>
      
      <p style="position: relative; z-index: 2; font-size: 12px; margin-top: 20px;">
        Already a manager? <a href="index.html">Log In</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBS3Fpobk342TpJw73mMgYOyUrWb-jBtfM",
      authDomain: "game-of-opinions-97b14.firebaseapp.com",
      projectId: "game-of-opinions-97b14",
      storageBucket: "game-of-opinions-97b14.firebasestorage.app",
      appId: "1:863518863234:web:3a2c2378a2a358e0b2299b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.handleSignup = async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!email || !password) {
        alert("Please fill in all fields.");
        return;
      }

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        // Initialize user record in Firestore
        await setDoc(doc(db, "users", userCredential.user.uid), {
          email: email,
          createdAt: new Date()
        });
        window.location.href = "myxi.html";
      } catch (error) {
        alert(error.message);
      }
    };
  </script>
</body>
</html>
