<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Your Team - Game of Opinions</title>

<style>

/* =========================

GLOBAL + BACKGROUND

========================= */

*{box-sizing:border-box;}

body{

  margin:0;

  font-family:'Segoe UI', Arial, sans-serif;

  color:white;

  overflow-x:hidden;

  background:

    radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 25%),

    linear-gradient(180deg,#020611 0%,#071320 40%,#071a29 100%);

}

/* stadium glow layers */

body::before{

  content:"";

  position:fixed;

  inset:0;

  background:

    radial-gradient(circle at center, rgba(120,255,120,0.08), transparent 40%),

    repeating-radial-gradient(circle at 50% -20%, rgba(255,255,255,0.03) 0px, transparent 80px, transparent 120px);

  pointer-events:none;

}

body::after{

  content:"";

  position:fixed;

  inset:0;

  background-image:

    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),

    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);

  background-size:80px 80px;

  opacity:0.2;

  pointer-events:none;

}

/* =========================

HEADER

========================= */

header{

  display:flex;

  justify-content:space-between;

  align-items:center;

  padding:20px 30px;

  backdrop-filter:blur(10px);

}

.logo{

  font-size:24px;

  font-weight:800;

}

.logo span{

  color:#c7ff38;

}

.mobile-nav a{

  margin-left:18px;

  color:#d9e3f0;

  text-decoration:none;

}

.mobile-nav a:hover{

  color:#c7ff38;

}

/* =========================

LAYOUT

========================= */

.container{

  max-width:1200px;

  margin:auto;

  padding:30px;

}

.main-layout{

  display:flex;

  gap:30px;

  align-items:flex-start;

}

.left-side{

  flex:2;

}

.weekly-panel{

  flex:1;

  background:rgba(0,0,0,0.35);

  border-radius:20px;

  padding:20px;

  backdrop-filter:blur(12px);

  border:1px solid rgba(255,255,255,0.1);

}

.weekly-panel h2{

  margin:0 0 10px;

}

.weekly-panel select,

.weekly-panel input{

  width:100%;

  padding:10px;

  margin-bottom:12px;

  border-radius:10px;

  border:none;

  background:#111827;

  color:white;

}

/* =========================

STADIUM SHELL

========================= */

.stadium-shell{

  border-radius:30px;

  padding:12px;

  background:

    radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 25%),

    linear-gradient(180deg,#08111c 0%,#030813 100%);

  box-shadow:0 20px 50px rgba(0,0,0,0.4);

}

/* =========================

PITCH

========================= */

.pitch-frame{

  background:#071019;

  border-radius:24px;

  padding:10px;

}

.pitch{

  position:relative;

  border-radius:20px;

  padding:30px 10px;

  display:flex;

  flex-direction:column;

  gap:18px;

  background:

    radial-gradient(circle at center, rgba(255,255,255,0.05), transparent 55%),

    linear-gradient(180deg,#2ca84a 0%,#228d3c 40%,#16632b 100%);

}

/* mowing stripes */

.pitch::after{

  content:"";

  position:absolute;

  inset:0;

  background:

    repeating-linear-gradient(

      to bottom,

      rgba(255,255,255,0.06) 0px,

      rgba(255,255,255,0.06) 24px,

      transparent 24px,

      transparent 48px

    );

  opacity:0.3;

}

/* halfway line */

.pitch::before{

  content:"";

  position:absolute;

  top:50%;

  width:100%;

  height:2px;

  background:rgba(255,255,255,0.2);

}

/* =========================

PITCH MARKINGS

========================= */

.center-circle{

  position:absolute;

  top:50%;

  left:50%;

  width:110px;

  height:110px;

  border-radius:50%;

  border:2px solid rgba(255,255,255,0.2);

  transform:translate(-50%,-50%);

}

.center-dot{

  position:absolute;

  top:50%;

  left:50%;

  width:8px;

  height:8px;

  background:white;

  border-radius:50%;

  transform:translate(-50%,-50%);

}

/* =========================

ROWS + PLAYERS

========================= */

.row{

  display:flex;

  justify-content:center;

  gap:12px;

  z-index:2;

}

.player{

  width:85px;

  text-align:center;

  background:rgba(0,0,0,0.25);

  border-radius:16px;

  padding:10px;

  backdrop-filter:blur(10px);

}

.shirt{

  width:50px;

  height:50px;

  margin:auto;

  border-radius:14px;

  background:linear-gradient(#2563eb,#1d4ed8);

}

select{

  width:100%;

  margin-top:6px;

}

/* =========================

BUTTON

========================= */

button{

  background:#c7ff38;

  border:none;

  padding:12px;

  width:100%;

  border-radius:10px;

  font-weight:bold;

  cursor:pointer;

}

#weeklyStatus{

  margin-top:10px;

  color:#7dff9b;

}

/* =========================

MOBILE

========================= */

@media(max-width:900px){

  .main-layout{

    flex-direction:column;

  }

}

</style>

</head>

<body>

<header>

  <div class="logo">GAME <span>OF OPINIONS</span></div>

  <nav class="mobile-nav">

    <a href="index.html">Home</a>

    <a href="myxi.html">Your Team</a>

    <a href="season.html">Season Picks</a>

    <a href="league.html">League</a>

  </nav>

</header>

<div class="container">

<h1>Your Team</h1>

<div class="main-layout">

<!-- LEFT -->

<div class="left-side">

<div class="stadium-shell">

<div class="pitch-frame">

<div class="pitch">

<div class="center-circle"></div>

<div class="center-dot"></div>

<!-- GK -->

<div class="row">

<div class="player">

<div class="shirt"></div>

<select><option>Select</option><option>Arsenal</option><option>Chelsea</option></select>

</div>

</div>

<!-- DEF -->

<div class="row">

<div class="player"><div class="shirt"></div><select><option>Select</option></select></div>

<div class="player"><div class="shirt"></div><select><option>Select</option></select></div>

<div class="player"><div class="shirt"></div><select><option>Select</option></select></div>

<div class="player"><div class="shirt"></div><select><option>Select</option></select></div>

</div>

<!-- MID -->

<div class="row">

<div class="player"><div class="shirt"></div><select><option>Select</option></select></div>

<div class="player"><div class="shirt"></div><select><option>Select</option></select></div>

<div class="player"><div class="shirt"></div><select><option>Select</option></select></div>

<div class="player"><div class="shirt"></div><select><option>Select</option></select></div>

</div>

<!-- FWD -->

<div class="row">

<div class="player"><div class="shirt"></div><select><option>Select</option></select></div>

<div class="player"><div class="shirt"></div><select><option>Select</option></select></div>

</div>

</div>

</div>

</div>

</div>

<!-- RIGHT -->

<div class="weekly-panel">

<h2>🔥 Weekly Picks</h2>

<select id="firstScorer">

<option>Select</option>

<option>Arsenal</option>

<option>Man City</option>

<option>Liverpool</option>

</select>

<input type="number" id="goalMinute" placeholder="Goal minute">

<select id="biggestWin">

<option>Select</option>

<option>Arsenal</option>

<option>Man City</option>

</select>

<button onclick="saveWeekly()">Save Picks</button>

<p id="weeklyStatus"></p>

</div>

</div>

</div>

<script>

function saveWeekly(){

  const data = {

    first:firstScorer.value,

    minute:goalMinute.value,

    win:biggestWin.value

  };

  localStorage.setItem("weekly",JSON.stringify(data));

  weeklyStatus.innerText="Saved!";

}

window.onload=function(){

  const saved=JSON.parse(localStorage.getItem("weekly"));

  if(saved){

    firstScorer.value=saved.first;

    goalMinute.value=saved.minute;

    biggestWin.value=saved.win;

  }

};

</script>

</body>

</html>
