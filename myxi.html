[06:05, 29/04/2026] TB: <!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Your Team - Game of Opinions</title>

<style>

/* =========================

   GLOBAL

========================= */

body {

  background: #0b1020;

  color: white;

  font-family: 'Segoe UI', Arial, sans-serif;

  margin: 0;

  padding-bottom: 90px;

}

/* =========================

   HEADER

========================= */

header {

  display: flex;

  justify-content: space-between;

  align-items: center;

  padding: 16px 24px;

  border-bottom: 1px solid #222;

}

.logo {

  font-size: 22px;

  font-weight: bold;

}

.logo span {

  color: gold;

}

/* =========================

   NAVIGATION

========================= */

.mobile-nav {

  display: flex;

  justify-content: space-around;

  align-items: center;

}

.mobile-nav a {

  color: white;

  text-decoration: none;

  text-align: center;

  font-size: 12px;

  line-height: 1.25;

  transition: 0.2s;

}

.mobile-nav a:hover {

  opacity: 0.7;

}

/* =========================

   CONTAINER

========================= */

.container {

  padding: 30px;

  max-width: 1024px;

  margin: auto;

}

h1 {

  margin-bottom: 8px;

}

p {

  color: #ccc;

}

/* =========================

   FORMATION

========================= */

.formation-block {

  display: flex;

  flex-direction: column;

  gap: 8px;

  max-width: 240px;

  margin-top: 14px;

}

.formation-block label {

  color: #cfd3da;

  font-size: 11px;

  letter-spacing: 0.14em;

  text-transform: uppercase;

}

#formation {

  width: 100%;

  padding: 10px 32px 10px 12px;

  background: #111827;

  color: white;

  border: 1px solid #333;

  border-radius: 10px;

  text-align: center;

  text-align-last: center;

  appearance: none;

}

/* =========================

   STADIUM

========================= */

.stadium {

  padding: 14px;

  border-radius: 36px;

  background:

    radial-gradient(circle at top, rgba(255,255,255,0.10), transparent 25%),

    linear-gradient(180deg, #09111f 0%, #050b14 100%);

  border: 1px solid rgba(255,255,255,0.08);

  box-shadow:

    0 25px 60px rgba(0,0,0,0.45),

    inset 0 1px 0 rgba(255,255,255,0.05);

  max-width: 780px;

  margin-left: auto;

  margin-right: auto;

  margin-bottom: 20px;

  position: relative;

}

.stadium-top {

  display: flex;

  justify-content: center;

  align-items: center;

  gap: 8px;

  flex-wrap: wrap;

  margin-bottom: 16px;

}

.stadium-banner {

  display: inline-flex;

  justify-content: center;

  align-items: center;

  background: #111c36;

  color: #fff;

  font-size: 11px;

  font-weight: 700;

  padding: 6px 10px;

  border-radius: 999px;

}

.stadium-banner--title {

  background: #0f3463;

  font-size: 14px;

  padding: 8px 18px;

}

.stadium-banner--quote {

  background: #1d6d9c;

  font-size: 10px;

}

/* =========================

   PITCH FRAME

========================= */

.pitch-frame {

  padding: 10px;

  border-radius: 28px;

  background: rgba(10, 13, 18, 0.98);

  border: 1px solid rgba(255,255,255,0.08);

}

/* =========================

   PITCH

========================= */

.pitch {

  position: relative;

  padding: 30px 12px 40px;

  display: flex;

  flex-direction: column;

  gap: 22px;

  background:

    radial-gradient(circle at center, rgba(255,255,255,0.06), transparent 60%),

    linear-gradient(180deg, #2d9b44 0%, #22863a 30%, #1f7a34 55%, #17662b 100%);

  overflow: hidden;

  border-radius: 24px;

  box-shadow:

    inset 0 0 120px rgba(0,0,0,0.35),

    0 30px 60px rgba(0,0,0,0.35);

}

.pitch::after {

  content: "";

  position: absolute;

  inset: 0;

  background:

    repeating-linear-gradient(

      to bottom,

      rgba(255,255,255,0.06) 0,

      rgba(255,255,255,0.06) 18px,

      transparent 18px,

      transparent 36px

    );

  opacity: 0.35;

  pointer-events: none;

}

.pitch::before {

  content: "";

  position: absolute;

  top: 50%;

  width: 100%;

  height: 1px;

  background: rgba(255,255,255,0.15);

}

/* =========================

   PITCH DETAILS

========================= */

.center-circle {

  position: absolute;

  top: 50%;

  left: 50%;

  width: 96px;

  height: 96px;

  border: 1px solid rgba(255,255,255,0.18);

  border-radius: 50%;

  transform: translate(-50%, -50%);

}

.penalty-box {

  position: absolute;

  width: 56%;

  height: 108px;

  border: 2px solid rgba(255,255,255,0.24);

  left: 22%;

}

.penalty-top {

  top: 16px;

}

.penalty-bottom {

  bottom: 16px;

}

.six-yard-box {

  position: absolute;

  width: 22%;

  height: 48px;

  border: 2px solid rgba(255,255,255,0.24);

  left: 39%;

}

.six-yard-top {

  top: 24px;

}

.six-yard-bottom {

  bottom: 24px;

}

.goal-line {

  position: absolute;

  width: 26%;

  height: 4px;

  background: rgba(255,255,255,0.95);

  left: 37%;

  border-radius: 2px;

}

.goal-top {

  top: 10px;

}

.goal-bottom {

  bottom: 10px;

}

/* =========================

   ROWS

========================= */

.row {

  display: flex;

  justify-content: center;

  align-items: flex-end;

  gap: 10px;

  position: relative;

  z-index: 2;

  flex-wrap: wrap;

}

/* =========================

   PLAYER CARD

========================= */

.player {

  width: 78px;

  text-align: center;

  transition: all 0.25s ease;

  display: flex;

  flex-direction: column;

  align-items: center;

  gap: 8px;

  padding: 10px 6px;

  border-radius: 20px;

  background: rgba(255,255,255,0.07);

  border: 1px solid rgba(255,255,255,0.12);

  backdrop-filter: blur(6px);

  box-shadow:

    0 8px 20px rgba(0,0,0,0.18),

    inset 0 1px 0 rgba(255,255,255,0.08);

}

.player:hover {

  transform: translateY(-4px) scale(1.04);

  box-shadow:

    0 18px 30px rgba(0,0,0,0.28);

}

/* =========================

   SHIRT

========================= */

.shirt {

  width: 54px;

  height: 54px;

  background: linear-gradient(#2563eb, #1d4ed8);

  margin: auto;

  border-radius: 18px 18px 24px 24px;

  position: relative;

  border: 1px solid rgba(255,255,255,0.12);

  box-shadow:

    inset 0 2px 6px rgba(255,255,255,0.12),

    0 8px 18px rgba(0,0,0,0.25);

}

.shirt::before,

.shirt::after {

  content: "";

  position: absolute;

  width: 12px;

  height: 14px;

  background: inherit;

  top: 9px;

}

.shirt::before {

  left: -12px;

  border-radius: 6px 0 0 6px;

}

.shirt::after {

  right: -12px;

  border-radius: 0 6px 6px 0;

}

/* =========================

   PLAYER NAME

========================= */

.player-name {

  font-size: 9px;

  font-weight: 700;

  line-height: 1.1;

  min-height: 22px;

  padding: 2px 6px;

  border-radius: 999px;

  background: rgba(0,0,0,0.42);

  color: white;

}

/* =========================

   POSITION

========================= */

.player strong {

  display: block;

  margin-top: 5px;

  font-size: 9px;

  color: rgba(255,255,255,0.8);

}

/* =========================

   SELECT

========================= */

select {

  width: 100%;

  margin-top: 6px;

  font-size: 9px;

  background: #111827;

  color: white;

  border: 1px solid rgba(255,255,255,0.08);

  border-radius: 10px;

  padding: 7px 10px;

  text-align: center;

}

/* =========================

   BUTTON

========================= */

button {

  margin-top: 30px;

  padding: 14px 24px;

  background: gold;

  color: #111;

  border: none;

  border-radius: 12px;

  font-weight: bold;

  cursor: pointer;

}

/* =========================

   STATUS

========================= */

#status {

  margin-top: 15px;

  color: #4ade80;

}

/* =========================

   MOBILE

========================= */

@media (max-width: 768px) {

  header {

    padding: 16px;

    flex-direction: column;

    gap: 12px;

    text-align: center;

  }

  .container {

    padding: 16px;

  }

  .player {

    width: 60px;

  }

  .shirt {

    width: 40px;

    height: 40px;

  }

  select {

    font-size: 7px;

  }

  .mobile-nav {

    position: fixed;

    bottom: 0;

    left: 0;

    width: 100%;

    background: #111827;

    padding: 10px 0;

    border-top: 1px solid #333;

    z-index: 999;

  }

}

</style>

</head>

<body>

<header>

<div class="logo">

GAME <span>OF OPINIONS</span>

</div>

<nav class="mobile-nav">

<a href="index.html">🏠<br>Home</a>

<a href="myxi.html">⚽<br>Team</a>

<a href="season.html">🏆<br>Picks</a>

<a href="league.html">📊<br>League</a>

</nav>

</header>

<div class="container">

<h1>Your Team</h1>

<p>Select 11 players. Maximum 1 player per club.</p>

<div class="formation-block">

<label for="formation">Formation</label>

<select id="formation" onchange="setFormation()">

<option value="442">4-4-2</option>

<option value="433">4-3-3</option>

<option value="352">3-5-2</option>

<option value="343">3-4-3</option>

<option value="451">4-5-1</option>

</select>

</div>

<div class="stadium">

<div class="stadium-top">

<div class="stadium-banner stadium-banner--quote">

"You Want Some"

</div>

<div class="stadium-banner stadium-banner--title">

Game of Opinions

</div>

<div class="stadium-banner stadium-banner--quote">

"Let's Be Having You"

</div>

</div>

<div class="pitch-frame">

<div class="pitch">

<div class="center-circle"></div>

<div class="goal-line goal-top"></div>

<div class="goal-line goal-bottom"></div>

<div class="penalty-box penalty-top"></div>

<div class="six-yard-box six-yard-top"></div>

<div class="penalty-box penalty-bottom"></div>

<div class="six-yard-box six-yard-bottom"></div>

<!-- GOALKEEPER -->

<div class="row">

<div class="player">

<div class="shirt"></div>

<div class="player-name"></div>

<strong>GK</strong>

<select onchange="updateShirt(this)">

<option>Select</option>

<option>Arsenal</option>

<option>Chelsea</option>

<option>Liverpool</option>

<option>Man City</option>

<option>Villa</option>

<option>Spurs</option>

<option>West Ham</option>

<option>Newcastle</option>

</select>

</div>

</div>

<!-- DEF -->

<div class="row" id="defenders"></div>

<!-- MID -->

<div class="row" id="midfielders"></div>

<!-- FWD -->

<div class="row" id="forwards"></div>

</div>

</div>

</div>

<button onclick="lockTeam()">

Lock Team

</button>

<p id="status"></p>

</div>

<script>

const playerTeams = {

  "Saliba": "Arsenal",

  "Gabriel": "Arsenal",

  "Van Dijk": "Liverpool",

  "Walker": "Man City",

  "Trippier": "Newcastle",

  "Romero": "Spurs",

  "Saka": "Arsenal",

  "Palmer": "Chelsea",

  "Salah": "Liverpool",

  "Son": "Spurs",

  "Bowen": "West Ham",

  "Bruno": "Man Utd",

  "Haaland": "Man City",

  "Watkins": "Villa",

  "Isak": "Newcastle",

  "Jackson": "Chelsea",

  "Solanke": "Bournemouth",

  "Darwin": "Liverpool"

};

function createPlayer(type) {

let players = [];

if (type === "DEF") {

players = ["Saliba", "Gabriel", "Van Dijk", "Walker", "Trippier", "Romero"];

}

if (type === "MID") {

players = ["Saka", "Palmer", "Salah", "Son", "Bowen", "Bruno"];

}

if (type === "FWD") {

players = ["Haaland", "Watkins", "Isak", "Jackson", "Solanke", "Darwin"];

}

let options = "<option>Select</option>";

players.forEach(player => {

options += <option>${player}</option>;

});

return `

<div class="player">

<div class="shirt"></div>

<div class="player-name"></div>

<strong>${type}</strong>

<select onchange="updateShirt(this)">

${options}

</select>

</div>

`;

}

function updateShirt(select) {

const shirt =

select.parentElement.querySelector(".shirt");

const value = select.value;

let club;

if (playerTeams[value]) {

club = playerTeams[value];

} else {

club = value;

}

const playerNameEl =

select.parentElement.querySelector('.player-name');

playerNameEl.innerText = club || '';

if (club === "Arsenal") {

shirt.style.background =

"linear-gradient(#ef4444, #991b1b)";

}

else if (club === "Chelsea") {

shirt.style.background =

"linear-gradient(#2563eb, #1d4ed8)";

}

else if (club === "Liverpool") {

shirt.style.background =

"linear-gradient(#dc2626, #7f1d1d)";

}

else if (club === "Villa") {

shirt.style.background =

"linear-gradient(#7c3aed, #5b21b6)";

}

else if (club === "Spurs") {

shirt.style.background =

"linear-gradient(#f8fafc, #94a3b8)";

}

else if (club === "West Ham") {

shirt.style.background =

"linear-gradient(#7f1d1d, #facc15)";

}

else if (club === "Newcastle") {

shirt.style.background =

"linear-gradient(#111827, #000000)";

}

else if (club === "Man City") {

shirt.style.background =

"linear-gradient(#38bdf8, #0284c7)";

}

else if (club === "Man Utd") {

shirt.style.background =

"linear-gradient(#c1121f, #7a0721)";

}

else if (club === "Bournemouth") {

shirt.style.background =

"linear-gradient(#d4003a, #640723)";

}

}

function setFormation() {

const formation =

document.getElementById("formation").value;

let def = 4;

let mid = 4;

let fwd = 2;

if (formation === "433") {

mid = 3;

fwd = 3;

}

if (formation === "352") {

def = 3;

mid = 5;

}

if (formation === "343") {

def = 3;

fwd = 3;

}

if (formation === "451") {

mid = 5;

fwd = 1;

}

document.getElementById("defenders").innerHTML =

Array(def).fill().map(() => createPlayer("DEF")).join("");

document.getElementById("midfielders").innerHTML =

Array(mid).fill().map(() => createPlayer("MID")).join("");

document.getElementById("forwards").innerHTML =

Array(fwd).fill().map(() => createPlayer("FWD")).join("");

}

function lockTeam() {

const selects =

document.querySelectorAll("select");

let clubs = [];

for (let select of selects) {

if (select.value === "Select") {

document.getElementById("status").innerText =

"Please complete all selections.";

return;

}

let playerName = select.value;

let club = playerTeams[playerName] || playerName;

if (clubs.includes(club)) {

document.getElementById("status").innerText =

"Maximum 1 player per club.";

return;

}

clubs.push(club);

}

document.getElementById("status").innerText =

"Team saved successfully!";

}

window.onload = function () {

setFormation();

};

</script>

</body>

</html>
