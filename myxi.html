<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Your Team - Game of Opinions</title>

<style>

/* =========================

GLOBAL + BACKGROUND

========================= */

*{box-sizing:border-box;}

body{

  margin:0;

  font-family:'Segoe UI', Arial, sans-serif;

  color:white;

  overflow-x:hidden;

  background:

    radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 25%),

    linear-gradient(180deg,#020611 0%,#071320 40%,#071a29 100%);

}

/* stadium glow layers */

body::before{

  content:"";

  position:fixed;

  inset:0;

  background:

    radial-gradient(circle at center, rgba(120,255,120,0.08), transparent 40%),

    repeating-radial-gradient(circle at 50% -20%, rgba(255,255,255,0.03) 0px, transparent 80px, transparent 120px);

  pointer-events:none;

}

body::after{

  content:"";

  position:fixed;

  inset:0;

  background-image:

    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),

    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);

  background-size:80px 80px;

  opacity:0.2;

  pointer-events:none;

}

/* =========================

HEADER

========================= */

header{

  display:flex;

  justify-content:space-between;

  align-items:center;

  padding:20px 30px;

  backdrop-filter:blur(10px);

}

.logo{

  font-size:24px;

  font-weight:800;

}

.logo span{

  color:#c7ff38;

}

.mobile-nav a{

  margin-left:18px;

  color:#d9e3f0;

  text-decoration:none;

}

.mobile-nav a:hover{

  color:#c7ff38;

}

/* =========================

LAYOUT

========================= */

.container{

  max-width:1200px;

  margin:auto;

  padding:30px;

}

.main-layout{

  display:flex;

  gap:30px;

  align-items:flex-start;

}

.left-side{

  flex:2;

}

.weekly-panel{

  flex:1;

  background:rgba(0,0,0,0.35);

  border-radius:20px;

  padding:20px;

  backdrop-filter:blur(12px);

  border:1px solid rgba(255,255,255,0.1);

}

.weekly-panel h2{

  margin:0 0 10px;

}

.weekly-panel select,

.weekly-panel input{

  width:100%;

  padding:10px;

  margin-bottom:12px;

  border-radius:10px;

  border:none;

  background:#111827;

  color:white;

}

/* =========================

STADIUM SHELL

========================= */

.stadium-shell{

  border-radius:30px;

  padding:12px;

  background:

    radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 25%),

    linear-gradient(180deg,#08111c 0%,#030813 100%);

  box-shadow:0 20px 50px rgba(0,0,0,0.4);

}

/* =========================

PITCH

========================= */

.pitch-frame{

  background:#071019;

  border-radius:24px;

  padding:10px;

}

.pitch{

  position:relative;

  border-radius:20px;

  padding:30px 10px;

  display:flex;

  flex-direction:column;

  gap:18px;

  background:

    radial-gradient(circle at center, rgba(255,255,255,0.05), transparent 55%),

    linear-gradient(180deg,#2ca84a 0%,#228d3c 40%,#16632b 100%);

}

/* mowing stripes */

.pitch::after{

  content:"";

  position:absolute;

  inset:0;

  background:

    repeating-linear-gradient(

      to bottom,

      rgba(255,255,255,0.06) 0px,

      rgba(255,255,255,0.06) 24px,

      transparent 24px,

      transparent 48px

    );

  opacity:0.3;

}

/* halfway line */

.pitch::before{

  content:"";

  position:absolute;

  top:50%;

  width:100%;

  height:2px;

  background:rgba(255,255,255,0.2);

}

/* =========================

PITCH MARKINGS

========================= */

.center-circle{

  position:absolute;

  top:50%;

  left:50%;

  width:110px;

  height:110px;

  border-radius:50%;

  border:2px solid rgba(255,255,255,0.2);

  transform:translate(-50%,-50%);

}

.center-dot{

  position:absolute;

  top:50%;

  left:50%;

  width:8px;

  height:8px;

  background:white;

  border-radius:50%;

  transform:translate(-50%,-50%);

}

/* =========================

ROWS + PLAYERS

========================= */

.row{

  display:flex;

  justify-content:center;

  gap:12px;

  z-index:2;

}

.player{

  width:85px;

  text-align:center;

  background:rgba(0,0,0,0.25);

  border-radius:16px;

  padding:10px;

  backdrop-filter:blur(10px);

}

.shirt{

  width:50px;

  height:50px;

  margin:auto;

  border-radius:14px;

  background:linear-gradient(#2563eb,#1d4ed8);

  position: relative;

}

.shirt::before,

.shirt::after {

  content: "";

  position: absolute;

  width: 10px;

  height: 12px;

  background: inherit;

  top: 6px;

}

.shirt::before {

  left: -9px;

  border-radius: 4px 0 0 4px;

}

.shirt::after {

  right: -9px;

  border-radius: 0 4px 4px 0;

}

select{

  width:100%;

  margin-top:6px;

}

/* =========================

BUTTON

========================= */

button{

  background:#c7ff38;

  border:none;

  padding:12px;

  width:100%;

  border-radius:10px;

  font-weight:bold;

  cursor:pointer;

}

#weeklyStatus{

  margin-top:10px;

  color:#7dff9b;

}

/* =========================

MOBILE

========================= */

@media(max-width:900px){

  .main-layout{

    flex-direction:column;

  }

}

</style>

</head>

<body>

<header>

  <div class="logo">GAME <span>OF OPINIONS</span></div>

  <nav class="mobile-nav">

    <a href="index.html">Home</a>

    <a href="myxi.html">Your Team</a>

    <a href="season.html">Season Picks</a>

    <a href="league.html">League</a>

  </nav>

</header>

<div class="container">

<h1>Your Team</h1>

<div class="main-layout">

<!-- LEFT -->

<div class="left-side">

<div class="stadium-shell">

<div class="pitch-frame">

<div class="pitch">

<div class="center-circle"></div>

<div class="center-dot"></div>

<!-- GK -->

<div class="row">

<div class="player">

<div class="shirt"></div>
<div class="player-label">Select GK</div>

</div>

</div>

<!-- DEF -->

<div class="row">

<div class="player"><div class="shirt"></div><div class="player-label">Select DEF</div></div>

<div class="player"><div class="shirt"></div><div class="player-label">Select DEF</div></div>

<div class="player"><div class="shirt"></div><div class="player-label">Select DEF</div></div>

<div class="player"><div class="shirt"></div><div class="player-label">Select DEF</div></div>

</div>

<!-- MID -->

<div class="row">

<div class="player"><div class="shirt"></div><div class="player-label">Select MID</div></div>

<div class="player"><div class="shirt"></div><div class="player-label">Select MID</div></div>

<div class="player"><div class="shirt"></div><div class="player-label">Select MID</div></div>

<div class="player"><div class="shirt"></div><div class="player-label">Select MID</div></div>

</div>

<!-- FWD -->

<div class="row">

<div class="player"><div class="shirt"></div><div class="player-label">Select FWD</div></div>

<div class="player"><div class="shirt"></div><div class="player-label">Select FWD</div></div>

</div>

</div>

</div>

</div>

<div class="pitch-actions">
  <button onclick="clearTeam()" class="btn-clear">Clear Team</button>
  <button onclick="saveTeam()">Save Team</button>
</div>

</div>

<!-- RIGHT -->

<div class="weekly-panel">

<h2>🔥 Weekly Picks</h2>
<p style="font-size: 13px; color: #9ca3af; margin-bottom: 5px; display: flex; justify-content: space-between;">
  <span>Club to score first:</span>
  <span style="color: #c7ff38; font-weight: bold;">10 pts</span>
</p>
<select id="firstScorer">
<option>Select</option>
</select>
<p style="font-size: 13px; color: #9ca3af; margin: 10px 0 5px; display: flex; justify-content: space-between;">
  <span>Minute of first goal:</span>
  <span style="color: #c7ff38; font-weight: bold;">40 pts</span>
</p>
<select id="goalMinute">
<option>Select</option>
</select>

<button onclick="saveWeekly()">Save Picks</button>

<p id="weeklyStatus"></p>

</div>

</div>

</div>

<!-- PICKER OVERLAY -->
<div class="picker-overlay" id="pickerOverlay">
  <div class="picker-content">
    <div class="picker-header">
      <h3 id="pickerTitle">Select Player</h3>
      <button onclick="closePicker()" style="width: auto; background: none; color: #9ca3af; padding: 0;">✕</button>
    </div>
    <div class="picker-list" id="pickerList"></div>
  </div>
</div>

<script>

let currentXI = Array(11).fill(null);
const slotPositions = ["GK", "DEF", "DEF", "DEF", "DEF", "MID", "MID", "MID", "MID", "FWD", "FWD"];

const playersByPos = {
  GK: [
    "Arsenal", "Aston Villa", "Bournemouth", "Brentford", "Brighton", 
    "Chelsea", "Crystal Palace", "Everton", "Fulham", "Ipswich", 
    "Leicester", "Liverpool", "Man City", "Man Utd", "Newcastle", 
    "Nott'm Forest", "Southampton", "Spurs", "West Ham", "Wolves"
  ],
  DEF: [
    { name: "Saliba", club: "Arsenal" }, { name: "Gabriel", club: "Arsenal" }, { name: "Konsa", club: "Aston Villa" }, { name: "Senesi", club: "Bournemouth" }, { name: "Pinnock", club: "Brentford" }, { name: "Dunk", club: "Brighton" }, { name: "James", club: "Chelsea" }, { name: "Guehi", club: "Crystal Palace" }, { name: "Tarkowski", club: "Everton" }, { name: "Robinson", club: "Fulham" }, { name: "Greaves", club: "Ipswich" }, { name: "Faes", club: "Leicester" }, { name: "Van Dijk", club: "Liverpool" }, { name: "Alexander-Arnold", club: "Liverpool" }, { name: "Gvardiol", club: "Man City" }, { name: "Martinez", club: "Man Utd" }, { name: "Schar", club: "Newcastle" }, { name: "Murillo", club: "Nott'm Forest" }, { name: "Bednarek", club: "Southampton" }, { name: "Romero", club: "Spurs" }, { name: "Kilman", club: "West Ham" }, { name: "Toti", club: "Wolves" }
  ],
  MID: [
    { name: "Odegaard", club: "Arsenal" }, { name: "Saka", club: "Arsenal" }, { name: "McGinn", club: "Aston Villa" }, { name: "Cook", club: "Bournemouth" }, { name: "Norgaard", club: "Brentford" }, { name: "Mitoma", club: "Brighton" }, { name: "Palmer", club: "Chelsea" }, { name: "Eze", club: "Crystal Palace" }, { name: "McNeil", club: "Everton" }, { name: "Pereira", club: "Fulham" }, { name: "Morsy", club: "Ipswich" }, { name: "Winks", club: "Leicester" }, { name: "Mac Allister", club: "Liverpool" }, { name: "De Bruyne", club: "Man City" }, { name: "Bruno Fernandes", club: "Man Utd" }, { name: "Guimaraes", club: "Newcastle" }, { name: "Gibbs-White", club: "Nott'm Forest" }, { name: "Fernandes", club: "Southampton" }, { name: "Maddison", club: "Spurs" }, { name: "Bowen", club: "West Ham" }, { name: "Lemina", club: "Wolves" }
  ],
  FWD: [
    { name: "Havertz", club: "Arsenal" }, { name: "Watkins", club: "Aston Villa" }, { name: "Evanilson", club: "Bournemouth" }, { name: "Mbeumo", club: "Brentford" }, { name: "Welbeck", club: "Brighton" }, { name: "Jackson", club: "Chelsea" }, { name: "Mateta", club: "Crystal Palace" }, { name: "Calvert-Lewin", club: "Everton" }, { name: "Jimenez", club: "Fulham" }, { name: "Delap", club: "Ipswich" }, { name: "Vardy", club: "Leicester" }, { name: "Salah", club: "Liverpool" }, { name: "Diaz", club: "Liverpool" }, { name: "Haaland", club: "Man City" }, { name: "Hojlund", club: "Man Utd" }, { name: "Isak", club: "Newcastle" }, { name: "Wood", club: "Nott'm Forest" }, { name: "Archer", club: "Southampton" }, { name: "Son", club: "Spurs" }, { name: "Kudus", club: "West Ham" }, { name: "Cunha", club: "Wolves" }
  ]
};

const playerToClub = {};
Object.values(playersByPos).flat().forEach(p => { if(typeof p === 'object') playerToClub[p.name] = p.club; });

function updateSlotUI(index) {
  const playerDivs = document.querySelectorAll('.pitch .player');
  const target = playerDivs[index];
  const shirt = target.querySelector('.shirt');
  const label = target.querySelector('.player-label');
  const playerName = currentXI[index];

  if (!playerName) {
    shirt.style.background = "linear-gradient(#2563eb, #1d4ed8)";
    label.innerText = `Select ${slotPositions[index]}`;
    return;
  }

  const team = playerToClub[playerName] || playerName;
  label.innerText = playerName;

  const colors = {
    "Arsenal": "linear-gradient(#ef4444, #991b1b)",
    "Aston Villa": "linear-gradient(#94bee5, #670e36)",
    "Bournemouth": "linear-gradient(#da291c, #000000)",
    "Brentford": "linear-gradient(#e30613, #ffffff)",
    "Brighton": "linear-gradient(#0057b8, #ffffff)",
    "Chelsea": "linear-gradient(#034694, #002d72)",
    "Crystal Palace": "linear-gradient(#1b458f, #c4122e)",
    "Everton": "linear-gradient(#003399, #002060)",
    "Fulham": "linear-gradient(#ffffff, #000000)",
    "Ipswich": "linear-gradient(#0055a5, #ffffff)",
    "Leicester": "linear-gradient(#003090, #ffffff)",
    "Liverpool": "linear-gradient(#c8102e, #8d0514)",
    "Man City": "linear-gradient(#6cabdd, #1c2c5b)",
    "Man Utd": "linear-gradient(#da291c, #000000)",
    "Newcastle": "linear-gradient(#241f20, #ffffff)",
    "Nott'm Forest": "linear-gradient(#dd0000, #ffffff)",
    "Southampton": "linear-gradient(#d71920, #ffffff)",
    "Spurs": "linear-gradient(#ffffff, #132257)",
    "West Ham": "linear-gradient(#7a263a, #1bb1e7)",
    "Wolves": "linear-gradient(#fdb913, #231f20)"
  };
  shirt.style.background = colors[team] || "linear-gradient(#2563eb, #1d4ed8)";
}

function openPicker(index) {
  const pos = slotPositions[index];
  const overlay = document.getElementById('pickerOverlay');
  const list = document.getElementById('pickerList');
  const title = document.getElementById('pickerTitle');
  
  title.innerText = `Pick ${pos}`;
  list.innerHTML = '';
  overlay.style.display = 'flex';

  const usedClubs = currentXI.map((p, i) => i !== index && p ? (playerToClub[p] || p) : null).filter(Boolean);

  playersByPos[pos].forEach(p => {
    const name = typeof p === 'string' ? p : p.name;
    const club = typeof p === 'string' ? p : p.club;
    const isUsed = usedClubs.includes(club);

    const item = document.createElement('div');
    item.className = `picker-item ${isUsed ? 'disabled' : ''}`;
    item.innerHTML = typeof p === 'string' ? p : `<strong>${name}</strong><br><small style="opacity:0.6">${club}</small>`;
    
    if (!isUsed) {
      item.onclick = () => {
        currentXI[index] = name;
        updateSlotUI(index);
        closePicker();
      };
    }
    list.appendChild(item);
  });
}

function closePicker() {
  document.getElementById('pickerOverlay').style.display = 'none';
}

function populateWeeklyOptions() {
  const clubSelect = document.getElementById('firstScorer');
  const minuteSelect = document.getElementById('goalMinute');

  // Populate Clubs using the GK list
  playersByPos.GK.forEach(club => {
    let opt = document.createElement('option');
    opt.value = club;
    opt.innerHTML = club;
    clubSelect.appendChild(opt);
  });

  // Populate Minutes 1-90
  for (let i = 1; i <= 90; i++) {
    let opt = document.createElement('option');
    opt.value = i;
    opt.innerHTML = i;
    minuteSelect.appendChild(opt);
  }
  let otherOpt = document.createElement('option');
  otherOpt.value = "Other";
  otherOpt.innerHTML = "Other (90+)";
  minuteSelect.appendChild(otherOpt);
}

function clearTeam() {
  if (confirm("Are you sure you want to clear your entire team?")) {
    currentXI = Array(11).fill(null);
    slotPositions.forEach((_, i) => updateSlotUI(i));
  }
}

function saveTeam() {
  if (currentXI.includes(null)) {
    alert("Please fill all 11 positions first!");
    return;
  }
  localStorage.setItem("myTeam", JSON.stringify(currentXI));
  alert("Team XI Saved!");
}

function saveWeekly(){

  const data = {

    first:firstScorer.value,

    minute:goalMinute.value

  };

  localStorage.setItem("weekly",JSON.stringify(data));

  weeklyStatus.innerText="Saved!";

}

window.onload=function(){
  // Setup Click listeners
  const playerDivs = document.querySelectorAll('.pitch .player');
  playerDivs.forEach((div, i) => div.onclick = () => openPicker(i));

  populateWeeklyOptions();

  const savedTeam = JSON.parse(localStorage.getItem("myTeam"));
  if(savedTeam) {
    currentXI = savedTeam;
    currentXI.forEach((_, i) => updateSlotUI(i));
  }

  const saved=JSON.parse(localStorage.getItem("weekly"));

  if(saved){

    firstScorer.value=saved.first;

    goalMinute.value=saved.minute;

  }

};

</script>

</body>

</html>
