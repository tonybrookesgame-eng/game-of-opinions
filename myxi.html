<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Your Team - Game of Opinions</title>

<style>

/* =========================

   GLOBAL

========================= */

*{

  box-sizing:border-box;

}

body{

  margin:0;

  font-family:'Segoe UI', Arial, sans-serif;

  color:white;

  overflow-x:hidden;

  background:

    radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 22%),

    linear-gradient(180deg,#020611 0%,#071320 35%,#071a29 100%);

  min-height:100vh;

  position:relative;

}

/* =========================

   BACKGROUND

========================= */

body::before{

  content:"";

  position:fixed;

  inset:0;

  background:

    radial-gradient(circle at center, rgba(120,255,120,0.05), transparent 30%),

    radial-gradient(circle at top, rgba(255,255,255,0.05), transparent 25%);

  pointer-events:none;

}

body::after{

  content:"";

  position:fixed;

  inset:0;

  background-image:

    linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),

    linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);

  background-size:80px 80px;

  opacity:0.12;

  pointer-events:none;

}

/* =========================

   HEADER

========================= */

header{

  position:sticky;

  top:0;

  z-index:999;

  backdrop-filter:blur(10px);

  background:rgba(5,10,18,0.72);

  border-bottom:1px solid rgba(255,255,255,0.08);

  display:flex;

  justify-content:space-between;

  align-items:center;

  padding:18px 28px;

}

.logo{

  font-size:24px;

  font-weight:800;

  letter-spacing:0.04em;

}

.logo span{

  color:#c7ff38;

}

.mobile-nav{

  display:flex;

  align-items:center;

  gap:18px;

}

.mobile-nav a{

  color:#d9e3f0;

  text-decoration:none;

  font-size:14px;

  transition:0.2s ease;

}

.mobile-nav a:hover{

  color:#c7ff38;

}

/* =========================

   CONTAINER

========================= */

.container{

  max-width:1200px;

  margin:auto;

  padding:40px 24px 100px;

  position:relative;

  z-index:1;

}

.page-top{

  display:flex;

  justify-content:space-between;

  align-items:flex-end;

  flex-wrap:wrap;

  gap:20px;

  margin-bottom:28px;

}

.page-title h1{

  font-size:54px;

  line-height:1;

  margin:0 0 12px;

}

.page-title h1 span{

  color:#c7ff38;

}

.page-title p{

  margin:0;

  color:#c7d2e0;

  font-size:17px;

  max-width:720px;

  line-height:1.7;

}

/* =========================

   FORMATION

========================= */

.formation-block{

  display:flex;

  flex-direction:column;

  gap:8px;

  min-width:210px;

}

.formation-block label{

  font-size:11px;

  text-transform:uppercase;

  letter-spacing:0.14em;

  color:#9fb0c8;

}

#formation{

  background:rgba(255,255,255,0.06);

  border:1px solid rgba(255,255,255,0.08);

  color:white;

  padding:12px 14px;

  border-radius:14px;

  font-size:15px;

  outline:none;

  backdrop-filter:blur(8px);

}

#formation option{

  background:#111827;

  color:white;

}

/* =========================

   STADIUM

========================= */

.stadium-shell{

  position:relative;

  border-radius:38px;

  padding:10px;

  background:

    radial-gradient(circle at top, rgba(255,255,255,0.06), transparent 24%),

    linear-gradient(180deg,#08111c 0%,#030813 100%);

  overflow:hidden;

  box-shadow:

    0 20px 40px rgba(0,0,0,0.3),

    inset 0 1px 0 rgba(255,255,255,0.06);

}

.pitch-frame{

  background:#071019;

  border-radius:28px;

  padding:8px;

  border:1px solid rgba(255,255,255,0.08);

}

/* =========================

   PITCH

========================= */

.pitch{

  position:relative;

  overflow:hidden;

  border-radius:24px;

  padding:28px 8px 34px;

  background:

    radial-gradient(circle at center, rgba(255,255,255,0.04), transparent 55%),

    linear-gradient(180deg,#2ca84a 0%,#228d3c 35%,#1d7b34 60%,#16632b 100%);

  box-shadow:

    inset 0 0 120px rgba(0,0,0,0.30),

    inset 0 30px 50px rgba(255,255,255,0.03);

}

.pitch::after{

  content:"";

  position:absolute;

  inset:0;

  background:

    repeating-linear-gradient(

      to bottom,

      rgba(255,255,255,0.04) 0px,

      rgba(255,255,255,0.04) 24px,

      transparent 24px,

      transparent 48px

    );

  opacity:0.12;

}

.pitch::before{

  content:"";

  position:absolute;

  top:50%;

  left:0;

  width:100%;

  height:2px;

  background:rgba(255,255,255,0.12);

}

/* =========================

   MARKINGS

========================= */

.center-circle{

  position:absolute;

  top:50%;

  left:50%;

  width:110px;

  height:110px;

  border-radius:50%;

  border:2px solid rgba(255,255,255,0.16);

  transform:translate(-50%,-50%);

}

.center-dot{

  position:absolute;

  top:50%;

  left:50%;

  width:10px;

  height:10px;

  background:rgba(255,255,255,0.35);

  border-radius:50%;

  transform:translate(-50%,-50%);

}

/* =========================

   ROWS

========================= */

.row{

  position:relative;

  z-index:2;

  display:flex;

  justify-content:center;

  align-items:flex-end;

  flex-wrap:wrap;

  gap:10px;

  margin:12px 0;

}

/* =========================

   PLAYER CARD

========================= */

.player{

  width:86px;

  background:rgba(0,0,0,0.18);

  border:1px solid rgba(255,255,255,0.10);

  border-radius:20px;

  padding:10px 8px;

  display:flex;

  flex-direction:column;

  align-items:center;

  backdrop-filter:blur(4px);

  transition:0.22s ease;

}

.player:hover{

  transform:translateY(-4px) scale(1.03);

  box-shadow:

    0 16px 26px rgba(0,0,0,0.28);

}

/* =========================

   SHIRT

========================= */

.shirt{

  width:58px;

  height:58px;

  border-radius:18px 18px 24px 24px;

  position:relative;

  background:linear-gradient(#2563eb,#1d4ed8);

  border:1px solid rgba(255,255,255,0.12);

  box-shadow:

    inset 0 2px 6px rgba(255,255,255,0.14),

    0 8px 18px rgba(0,0,0,0.22);

}

.shirt::before,

.shirt::after{

  content:"";

  position:absolute;

  top:10px;

  width:13px;

  height:16px;

  background:inherit;

}

.shirt::before{

  left:-13px;

  border-radius:6px 0 0 6px;

}

.shirt::after{

  right:-13px;

  border-radius:0 6px 6px 0;

}

/* =========================

   PLAYER NAME

========================= */

.player-name{

  margin-top:10px;

  min-height:20px;

  font-size:10px;

  font-weight:700;

  background:rgba(0,0,0,0.40);

  padding:4px 8px;

  border-radius:999px;

  max-width:100%;

  overflow:hidden;

  text-overflow:ellipsis;

  white-space:nowrap;

}

/* =========================

   POSITION

========================= */

.player strong{

  margin-top:6px;

  font-size:10px;

  color:#d3ddeb;

  letter-spacing:0.06em;

}

/* =========================

   SELECT

========================= */

select{

  margin-top:8px;

  width:100%;

  background:#111827;

  color:white;

  border:1px solid rgba(255,255,255,0.08);

  border-radius:10px;

  padding:8px 6px;

  font-size:10px;

  text-align:center;

  outline:none;

}

select:focus{

  border-color:#c7ff38;

}

/* =========================

   BUTTON

========================= */

.button-wrap{

  text-align:center;

}

button{

  margin-top:26px;

  background:#c7ff38;

  color:#041102;

  border:none;

  border-radius:14px;

  padding:16px 30px;

  font-size:16px;

  font-weight:800;

  cursor:pointer;

  transition:0.2s ease;

}

button:hover{

  transform:translateY(-2px) scale(1.02);

}

/* =========================

   STATUS

========================= */

#status{

  text-align:center;

  margin-top:18px;

  font-weight:700;

  color:#7dff9b;

}

/* =========================

   MOBILE

========================= */

@media(max-width:900px){

  .page-title h1{

    font-size:42px;

  }

  .player{

    width:78px;

  }

  .shirt{

    width:46px;

    height:46px;

  }

}

@media(max-width:640px){

  header{

    flex-direction:column;

    gap:14px;

    text-align:center;

  }

  .mobile-nav{

    width:100%;

    justify-content:center;

    flex-wrap:wrap;

  }

  .container{

    padding:26px 14px 90px;

  }

  .page-title h1{

    font-size:34px;

  }

  .page-title p{

    font-size:15px;

  }

  .player{

    width:72px;

  }

  .shirt{

    width:40px;

    height:40px;

  }

  .player-name{

    font-size:8px;

  }

  .player strong{

    font-size:8px;

  }

  select{

    font-size:7px;

  }

  button{

    width:100%;

  }

}

</style>

</head>

<body>

<header>

  <div class="logo">

    GAME <span>OF OPINIONS</span>

  </div>

  <nav class="mobile-nav">

    <a href="index.html">Home</a>

    <a href="myxi.html">Your Team</a>

    <a href="season.html">Season Picks</a>

    <a href="league.html">League</a>

  </nav>

</header>

<div class="container">

  <div class="page-top">

    <div class="page-title">

      <h1>Your <span>Team</span></h1>

      <p>

        Pick your strongest 11. STRICTLY one player per club.

        Put your manager hat on and MANAGE! No loading up on

        players from top teams, this is an even playing field.

      </p>

    </div>

    <div class="formation-block">

      <label for="formation">Formation</label>

      <select id="formation" onchange="setFormation()">

        <option value="442">4-4-2</option>

        <option value="433">4-3-3</option>

        <option value="352">3-5-2</option>

        <option value="343">3-4-3</option>

        <option value="451">4-5-1</option>

      </select>

    </div>

  </div>

  <div class="stadium-shell">

    <div class="pitch-frame">

      <div class="pitch">

        <div class="center-circle"></div>

        <div class="center-dot"></div>

        <!-- GOALKEEPER -->

        <div class="row">

          <div class="player">

            <div class="shirt"></div>

            <div class="player-name"></div>

            <strong>GK</strong>

            <select onchange="updateShirt(this)">

              <option>Select</option>

              <option value="Alisson">Alisson (Liverpool)</option>

              <option value="Raya">Raya (Arsenal)</option>

              <option value="Ederson">Ederson (Man City)</option>

              <option value="Martinez">Martinez (Villa)</option>

              <option value="Vicario">Vicario (Spurs)</option>

              <option value="Onana">Onana (Man Utd)</option>

              <option value="Pope">Pope (Newcastle)</option>

              <option value="Pickford">Pickford (Everton)</option>

            </select>

          </div>

        </div>

        <!-- DEF -->

        <div class="row" id="defenders"></div>

        <!-- MID -->

        <div class="row" id="midfielders"></div>

        <!-- FWD -->

        <div class="row" id="forwards"></div>

      </div>

    </div>

  </div>

  <div class="button-wrap">

    <button onclick="lockTeam()">

      Lock Team

    </button>

  </div>

  <p id="status"></p>

</div>

<script>

/* =========================

   PLAYER DATABASE

========================= */

const players = [

  /* GK */

  { name:"Alisson", club:"Liverpool", position:"GK" },

  { name:"Raya", club:"Arsenal", position:"GK" },

  { name:"Ederson", club:"Man City", position:"GK" },

  { name:"Martinez", club:"Villa", position:"GK" },

  { name:"Vicario", club:"Spurs", position:"GK" },

  { name:"Onana", club:"Man Utd", position:"GK" },

  { name:"Pope", club:"Newcastle", position:"GK" },

  { name:"Pickford", club:"Everton", position:"GK" },

  /* DEF */

  { name:"Saliba", club:"Arsenal", position:"DEF" },

  { name:"Gabriel", club:"Arsenal", position:"DEF" },

  { name:"White", club:"Arsenal", position:"DEF" },

  { name:"Timber", club:"Arsenal", position:"DEF" },

  { name:"Van Dijk", club:"Liverpool", position:"DEF" },

  { name:"Konate", club:"Liverpool", position:"DEF" },

  { name:"Robertson", club:"Liverpool", position:"DEF" },

  { name:"Alexander-Arnold", club:"Liverpool", position:"DEF" },

  { name:"Walker", club:"Man City", position:"DEF" },

  { name:"Gvardiol", club:"Man City", position:"DEF" },

  { name:"Dias", club:"Man City", position:"DEF" },

  { name:"Akanji", club:"Man City", position:"DEF" },

  { name:"Romero", club:"Spurs", position:"DEF" },

  { name:"Van de Ven", club:"Spurs", position:"DEF" },

  { name:"Porro", club:"Spurs", position:"DEF" },

  { name:"Udogie", club:"Spurs", position:"DEF" },

  { name:"Trippier", club:"Newcastle", position:"DEF" },

  { name:"Schar", club:"Newcastle", position:"DEF" },

  { name:"Konsa", club:"Villa", position:"DEF" },

  { name:"Pau Torres", club:"Villa", position:"DEF" },

  { name:"Dalot", club:"Man Utd", position:"DEF" },

  { name:"Martinez", club:"Man Utd", position:"DEF" },

  { name:"Colwill", club:"Chelsea", position:"DEF" },

  { name:"Cucurella", club:"Chelsea", position:"DEF" },

  { name:"Kilman", club:"West Ham", position:"DEF" },

  { name:"Branthwaite", club:"Everton", position:"DEF" },

  { name:"Andersen", club:"Crystal Palace", position:"DEF" },

  { name:"Guehi", club:"Crystal Palace", position:"DEF" },

  /* MID */

  { name:"Saka", club:"Arsenal", position:"MID" },

  { name:"Odegaard", club:"Arsenal", position:"MID" },

  { name:"Rice", club:"Arsenal", position:"MID" },

  { name:"Martinelli", club:"Arsenal", position:"MID" },

  { name:"Salah", club:"Liverpool", position:"MID" },

  { name:"Mac Allister", club:"Liverpool", position:"MID" },

  { name:"Szoboszlai", club:"Liverpool", position:"MID" },

  { name:"Foden", club:"Man City", position:"MID" },

  { name:"De Bruyne", club:"Man City", position:"MID" },

  { name:"Rodri", club:"Man City", position:"MID" },

  { name:"Bernardo Silva", club:"Man City", position:"MID" },

  { name:"Son", club:"Spurs", position:"MID" },

  { name:"Maddison", club:"Spurs", position:"MID" },

  { name:"Bruno", club:"Man Utd", position:"MID" },

  { name:"Mainoo", club:"Man Utd", position:"MID" },

  { name:"Palmer", club:"Chelsea", position:"MID" },

  { name:"Caicedo", club:"Chelsea", position:"MID" },

  { name:"Enzo", club:"Chelsea", position:"MID" },

  { name:"Bowen", club:"West Ham", position:"MID" },

  { name:"Paqueta", club:"West Ham", position:"MID" },

  { name:"Kudus", club:"West Ham", position:"MID" },

  { name:"Gordon", club:"Newcastle", position:"MID" },

  { name:"Guimaraes", club:"Newcastle", position:"MID" },

  { name:"McGinn", club:"Villa", position:"MID" },

  { name:"Eze", club:"Crystal Palace", position:"MID" },

  { name:"Olise", club:"Crystal Palace", position:"MID" },

  { name:"Mitoma", club:"Brighton", position:"MID" },

  /* FWD */

  { name:"Haaland", club:"Man City", position:"FWD" },

  { name:"Watkins", club:"Villa", position:"FWD" },

  { name:"Isak", club:"Newcastle", position:"FWD" },

  { name:"Darwin", club:"Liverpool", position:"FWD" },

  { name:"Jota", club:"Liverpool", position:"FWD" },

  { name:"Jackson", club:"Chelsea", position:"FWD" },

  { name:"Nkunku", club:"Chelsea", position:"FWD" },

  { name:"Solanke", club:"Bournemouth", position:"FWD" },

  { name:"Hojlund", club:"Man Utd", position:"FWD" },

  { name:"Jesus", club:"Arsenal", position:"FWD" },

  { name:"Richarlison", club:"Spurs", position:"FWD" },

  { name:"Antonio", club:"West Ham", position:"FWD" },

  { name:"Mateta", club:"Crystal Palace", position:"FWD" }

];

/* =========================

   CREATE PLAYER

========================= */

function createPlayer(type){

  const filteredPlayers =

    players.filter(player => player.position === type);

  let options = '<option>Select</option>';

  filteredPlayers.forEach(player => {

    options += `

      <option value="${player.name}">

        ${player.name} (${player.club})

      </option>

    `;

  });

  return `

    <div class="player">

      <div class="shirt"></div>

      <div class="player-name"></div>

      <strong>${type}</strong>

      <select onchange="updateShirt(this)">

        ${options}

      </select>

    </div>

  `;

}

/* =========================

   UPDATE SHIRT

========================= */

function updateShirt(select){

  const shirt =

    select.parentElement.querySelector(".shirt");

  const playerNameEl =

    select.parentElement.querySelector(".player-name");

  const value = select.value;

  const selectedPlayer =

    players.find(player => player.name === value);

  let club = selectedPlayer

    ? selectedPlayer.club

    : "";

  playerNameEl.innerText = club || "";

  shirt.style.background =

    "linear-gradient(#2563eb,#1d4ed8)";

  shirt.style.border =

    "1px solid rgba(255,255,255,0.12)";

  if(club === "Arsenal"){

    shirt.style.background =

      "linear-gradient(#ef4444 0 72%, #ffffff 72% 100%)";

  }

  else if(club === "Chelsea"){

    shirt.style.background =

      "linear-gradient(#2563eb,#1d4ed8)";

  }

  else if(club === "Liverpool"){

    shirt.style.background =

      "linear-gradient(#dc2626,#7f1d1d)";

  }

  else if(club === "Villa"){

    shirt.style.background =

      "linear-gradient(#7c3aed,#5b21b6)";

  }

  else if(club === "Spurs"){

    shirt.style.background =

      "linear-gradient(#ffffff,#dbeafe)";

    shirt.style.border =

      "2px solid #334155";

  }

  else if(club === "West Ham"){

    shirt.style.background =

      "linear-gradient(#7f1d1d,#facc15)";

  }

  else if(club === "Newcastle"){

    shirt.style.background =

      "repeating-linear-gradient(90deg,#111 0 8px,#fff 8px 16px)";

  }

  else if(club === "Man City"){

    shirt.style.background =

      "linear-gradient(#7dd3fc,#38bdf8)";

  }

  else if(club === "Man Utd"){

    shirt.style.background =

      "linear-gradient(#c1121f,#7a0721)";

  }

  else if(club === "Everton"){

    shirt.style.background =

      "linear-gradient(#1d4ed8,#1e3a8a)";

  }

  else if(club === "Crystal Palace"){

    shirt.style.background =

      "repeating-linear-gradient(90deg,#1d4ed8 0 10px,#dc2626 10px 20px)";

  }

}

/* =========================

   FORMATION

========================= */

function setFormation(){

  const formation =

    document.getElementById("formation").value;

  let def = 4;

  let mid = 4;

  let fwd = 2;

  if(formation === "433"){

    mid = 3;

    fwd = 3;

  }

  if(formation === "352"){

    def = 3;

    mid = 5;

  }

  if(formation === "343"){

    def = 3;

    fwd = 3;

  }

  if(formation === "451"){

    mid = 5;

    fwd = 1;

  }

  document.getElementById("defenders").innerHTML =

    Array(def).fill().map(() =>

      createPlayer("DEF")

    ).join("");

  document.getElementById("midfielders").innerHTML =

    Array(mid).fill().map(() =>

      createPlayer("MID")

    ).join("");

  document.getElementById("forwards").innerHTML =

    Array(fwd).fill().map(() =>

      createPlayer("FWD")

    ).join("");

}

/* =========================

   LOCK TEAM

========================= */

function lockTeam(){

  const selects =

    document.querySelectorAll("select");

  let clubs = [];

  for(let select of selects){

    if(select.value === "Select"){

      document.getElementById("status").innerText =

        "Please complete all selections.";

      return;

    }

    const selectedPlayer =

      players.find(player =>

        player.name === select.value

      );

    let club = selectedPlayer

      ? selectedPlayer.club

      : "";

    if(clubs.includes(club)){

      document.getElementById("status").innerText =

        "STRICTLY one player per club.";

      return;

    }

    clubs.push(club);

  }

  document.getElementById("status").innerText =

    "Team saved successfully!";

}

/* =========================

   LOAD

========================= */

window.onload = function(){

  setFormation();

};

</script>

</body>

</html>
