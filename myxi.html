<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Your Team - Game of Opinions</title>

<style>

/* =========================

   GLOBAL

========================= */

body {

  background: #0b1020;

  color: white;

  font-family: 'Segoe UI', Arial, sans-serif;

  margin: 0;

  padding-bottom: 90px;

}

/* =========================

   HEADER

========================= */

header {

  display: flex;

  justify-content: space-between;

  align-items: center;

  padding: 16px 24px;

  border-bottom: 1px solid #222;

}

.logo {

  font-size: 22px;

  font-weight: bold;

}

.logo span {

  color: gold;

}

/* =========================

   NAVIGATION

========================= */

.mobile-nav {

  display: flex;

  justify-content: space-around;

  align-items: center;

}

.mobile-nav a {

  color: white;

  text-decoration: none;

  text-align: center;

  font-size: 12px;

  line-height: 1.25;

  transition: 0.2s;

}

.mobile-nav a:hover {

  opacity: 0.7;

}

/* =========================

   CONTAINER

========================= */

.container {

  padding: 30px;

  max-width: 1024px;

  margin: auto;

}

h1 {

  margin-bottom: 8px;

}

p {

  color: #ccc;

}

/* =========================

   FORMATION

========================= */

.formation-block {

  display: flex;

  flex-direction: column;

  gap: 8px;

  max-width: 240px;

  margin-top: 14px;

}

.formation-block label {

  color: #cfd3da;

  font-size: 11px;

  letter-spacing: 0.14em;

  text-transform: uppercase;

}

#formation {

  margin-top: 0;

  width: 100%;

  padding: 10px 32px 10px 12px;

  background: #111827;

  color: white;

  border: 1px solid #333;

  border-radius: 10px;

  text-align: center;

  text-align-last: center;

  appearance: none;

  background-image: linear-gradient(45deg, transparent 50%, #fff 50%), linear-gradient(135deg, #fff 50%, transparent 50%);

  background-position: calc(100% - 12px) calc(50% + 1px), calc(100% - 8px) calc(50% + 1px);

  background-size: 6px 6px;

  background-repeat: no-repeat;

}

/* =========================

   PITCH

========================= */

.stadium {

  padding: 10px;

  border-radius: 32px;

  background: radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 30%), #05121d;

  border: 1px solid rgba(255,255,255,0.08);

  box-shadow: 0 18px 50px rgba(0,0,0,0.45);

  max-width: 780px;

  margin-left: auto;

  margin-right: auto;

  margin-bottom: 20px;

  position: relative;

}

.stadium-banner {

  display: inline-flex;

  justify-content: center;

  align-items: center;

  background: #111c36;

  color: #f8f8f8;

  font-size: 11px;

  font-weight: 700;

  padding: 6px 10px;

  border-radius: 999px;

  letter-spacing: 0.02em;

  text-transform: uppercase;

  box-shadow: 0 6px 14px rgba(0,0,0,0.20);

  margin: 0;

  max-width: 280px;

}

.stadium-top {

  display: flex;

  justify-content: center;

  align-items: center;

  gap: 8px;

  flex-wrap: wrap;

  margin-bottom: 16px;

}

.stadium-banner--title {

  background: #0f3463;

  color: #fff;

  letter-spacing: 0.04em;

  text-transform: none;

  font-size: 14px;

  padding: 8px 18px;

  min-width: 180px;

  text-align: center;

}

.stadium-banner--quote {

  background: #1d6d9c;

  color: #fff;

  letter-spacing: 0.02em;

  text-transform: none;

  font-size: 10px;

  padding: 5px 9px;

}

.pitch-frame {

  padding: 10px;

  border-radius: 28px;

  background: rgba(10, 13, 18, 0.98);

  border: 1px solid rgba(255,255,255,0.08);

  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);

  max-width: 760px;

  margin-left: auto;

  margin-right: auto;

}

.pitch {

  position: relative;

  padding: 10px 0 12px;

  display: flex;

  flex-direction: column;

  gap: 16px;

  background: linear-gradient(180deg, #1f7f33 0%, #18742c 35%, #1b6d2a 60%, #1d7f34 100%);

  overflow: hidden;

}

.pitch::after {

  content: "";

  position: absolute;

  inset: 0;

  background: repeating-linear-gradient(

    to bottom,

    rgba(255,255,255,0.08) 0,

    rgba(255,255,255,0.08) 10px,

    transparent 10px,

    transparent 20px

  );

  opacity: 0.25;

  pointer-events: none;

}

.pitch::before {

  content: "";

  position: absolute;

  top: 50%;

  width: 100%;

  height: 1px;

  background: rgba(255,255,255,0.15);

}

/* Centre circle */

.center-circle {

  position: absolute;

  top: 50%;

  left: 50%;

  width: 96px;

  height: 96px;

  border: 1px solid rgba(255,255,255,0.18);

  border-radius: 50%;

  transform: translate(-50%, -50%);

}

/* Penalty boxes */

.penalty-box {

  position: absolute;

  width: 56%;

  height: 108px;

  border: 2px solid rgba(255,255,255,0.24);

  left: 22%;

  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);

}

.penalty-top {

  top: 16px;

}

.penalty-bottom {

  bottom: 16px;

}

.six-yard-box {

  position: absolute;

  width: 22%;

  height: 48px;

  border: 2px solid rgba(255,255,255,0.24);

  left: 39%;

  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);

}

.six-yard-top {

  top: 24px;

}

.six-yard-bottom {

  bottom: 24px;

}

.goal-line {

  position: absolute;

  width: 26%;

  height: 4px;

  background: rgba(255,255,255,0.95);

  left: 37%;

  border-radius: 2px;

  box-shadow: 0 0 10px rgba(255,255,255,0.18);

}

.goal-top {

  top: 10px;

}

.goal-bottom {

  bottom: 10px;

}

/* =========================

   ROWS

========================= */

.row {

  display: flex;

  justify-content: center;

  align-items: flex-end;

  gap: 8px;

  position: relative;

  z-index: 2;

  flex-wrap: wrap;

}

/* =========================

   PLAYER

========================= */

.player {

  width: 76px;

  text-align: center;

  transition: transform 0.18s ease;

  display: flex;

  flex-direction: column;

  align-items: center;

  gap: 6px;

  padding: 6px 4px 8px;

  border-radius: 16px;

  background: rgba(255,255,255,0.08);

  border: 1px solid rgba(255,255,255,0.12);

}

.player:hover {

  transform: scale(1.02);

}

/* =========================

   SHIRT

========================= */

.shirt {

  width: 52px;

  height: 52px;

  background: linear-gradient(#2563eb, #1d4ed8);

  margin: auto;

  border-radius: 16px 16px 22px 22px;

  position: relative;

  border: 1px solid rgba(255,255,255,0.16);

  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05), 0 5px 12px rgba(0,0,0,0.20);

}

/* Sleeves */

.shirt::before,

.shirt::after {

  content: "";

  position: absolute;

  width: 12px;

  height: 14px;

  background: inherit;

  top: 9px;

}

.shirt::before {

  left: -12px;

  border-radius: 6px 0 0 6px;

}

.shirt::after {

  right: -12px;

  border-radius: 0 6px 6px 0;

}

/* =========================

   BADGES

========================= */

.badge {

  position: absolute;

  top: 30px;

  left: 50%;

  transform: translateX(-50%);

  width: 14px;

  height: 14px;

  object-fit: contain;

}

/* =========================

   PLAYER NAME

========================= */

.player-name {

  font-size: 9px;

  font-weight: 700;

  line-height: 1.1;

  min-height: 22px;

  padding: 2px 6px;

  border-radius: 999px;

  background: rgba(0,0,0,0.42);

  color: white;

  letter-spacing: 0.02em;

  text-align: center;

  white-space: nowrap;

  overflow: hidden;

  text-overflow: ellipsis;

  display: block;

}



/* =========================

   POSITION

========================= */

.player strong {

  display: block;

  margin-top: 5px;

  font-size: 9px;

  color: rgba(255,255,255,0.8);

}

/* =========================

   SELECT

========================= */

select {

  width: 100%;

  margin-top: 6px;

  font-size: 9px;

  background: #111827;

  color: white;

  border: 1px solid rgba(255,255,255,0.08);

  border-radius: 10px;

  padding: 7px 10px 7px 12px;

  box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);

  appearance: none;

  text-align: center;

  text-align-last: center;

  background-image: linear-gradient(45deg, transparent 50%, #fff 50%), linear-gradient(135deg, #fff 50%, transparent 50%);

  background-position: calc(100% - 12px) calc(50% + 1px), calc(100% - 8px) calc(50% + 1px);

  background-size: 6px 6px;

  background-repeat: no-repeat;

}

select:focus {

  outline: none;

  border: 1px solid gold;

}

/* =========================

   BUTTON

========================= */

button {

  margin-top: 30px;

  padding: 14px 24px;

  background: gold;

  color: #111;

  border: none;

  border-radius: 12px;

  font-weight: bold;

  letter-spacing: 0.02em;

  cursor: pointer;

  transition: transform 0.2s ease, box-shadow 0.2s ease;

}

button:hover {

  transform: translateY(-1px);

  box-shadow: 0 10px 20px rgba(0,0,0,0.18);

}

/* =========================

   STATUS

========================= */

#status {

  margin-top: 15px;

  color: #4ade80;

}

/* =========================

   MOBILE

========================= */

@media (max-width: 768px) {

  header {

    padding: 16px;

    flex-direction: column;

    gap: 12px;

    text-align: center;

  }

  .container {

    padding: 16px 14px 90px;

  }

  h1 {

    font-size: 25px;

    text-align: center;

  }

  p {

    text-align: center;

  }

  .stadium {

    padding: 8px;

  }

  .stadium-top {

    flex-wrap: nowrap;

    align-items: center;

    gap: 6px;

    margin-bottom: 10px;

    overflow-x: auto;

    padding-bottom: 2px;

  }

  .stadium-top::-webkit-scrollbar {

    display: none;

  }

  .stadium-banner {

    flex: 0 0 auto;

    justify-content: center;

    font-size: 9px;

    padding: 4px 8px;

    min-width: 72px;

  }

  .stadium-banner--title {

    font-size: 13px;

    padding: 7px 10px;

    min-width: 120px;

  }

  .stadium-banner--quote {

    font-size: 8px;

    padding: 4px 7px;

  }

  .pitch-frame {

    padding: 6px;

  }

  .pitch {

    padding: 10px 6px 10px;

    gap: 10px;

  }

  .row {

    gap: 5px;

  }

  .player {

    width: 60px;

    padding: 5px 3px 7px;

  }

  .shirt {

    width: 38px;

    height: 38px;

  }

  .shirt::before,

  .shirt::after {

    width: 7px;

    height: 9px;

    top: 7px;

  }

  .shirt::before {

    left: -7px;

  }

  .shirt::after {

    right: -7px;

  }

  .badge {

    width: 8px;

    height: 8px;

    top: 24px;

  }

  .player-name {

    font-size: 8px;

    min-height: 16px;

    padding: 1px 3px;

    white-space: nowrap;

    overflow: hidden;

    text-overflow: ellipsis;

  }

  .formation-block {

    max-width: 210px;

    width: 100%;

    margin: 0 auto 10px;

  }

  #formation {

    padding-right: 26px;

  }

  select {

    width: 100%;

    font-size: 7px;

    padding: 4px 6px;

  }

  .player strong {

    font-size: 7px;

  }

  button {

    width: 100%;

  }

  .mobile-nav {

    position: fixed;

    bottom: 0;

    left: 0;

    width: 100%;

    background: #111827;

    padding: 10px 0;

    border-top: 1px solid #333;

    z-index: 999;

  }

}

</style>

</head>

<body>

<header>

<div class="logo">

GAME <span>OF OPINIONS</span>

</div>

<nav class="mobile-nav">

<a href="index.html">🏠<br>Home</a>

<a href="myxi.html">⚽<br>Team</a>

<a href="season.html">🏆<br>Picks</a>

<a href="league.html">📊<br>League</a>

</nav>

</header>

<div class="container">

<h1>Your Team</h1>

<p>

Select 11 players. Maximum 1 player per club.

</p>

<div class="formation-block">

  <label for="formation">Formation</label>

  <select id="formation" onchange="setFormation()">

    <option value="442">4-4-2</option>

    <option value="433">4-3-3</option>

    <option value="352">3-5-2</option>

    <option value="343">3-4-3</option>

    <option value="451">4-5-1</option>

  </select>

</div>

<div class="stadium">

  <div class="stadium-top">

    <div class="stadium-banner stadium-banner--quote">"You Want Some"</div>

    <div class="stadium-banner stadium-banner--title">Game of Opinions</div>

    <div class="stadium-banner stadium-banner--quote">"Lets Be Having You"</div>

  </div>

  <div class="pitch-frame">

    <div class="pitch">

      <div class="center-circle"></div>

      <div class="goal-line goal-top"></div>

      <div class="goal-line goal-bottom"></div>

      <div class="penalty-box penalty-top"></div>

      <div class="six-yard-box six-yard-top"></div>

      <div class="penalty-box penalty-bottom"></div>

      <div class="six-yard-box six-yard-bottom"></div>

<!-- GOALKEEPER -->

<div class="row">

<div class="player">

<div class="shirt">

<img class="badge" src="badges/premierleague.png">

</div>

<div class="player-name"></div>

<strong>GK</strong>

<select onchange="updateShirt(this)">

<option>Select</option>

<option>Arsenal</option>

<option>Chelsea</option>

<option>Liverpool</option>

<option>Man City</option>

<option>Villa</option>

<option>Spurs</option>

<option>West Ham</option>

<option>Newcastle</option>

</select>

</div>

</div>

<!-- DEF -->

<div class="row" id="defenders"></div>

<!-- MID -->

<div class="row" id="midfielders"></div>

<!-- FWD -->

<div class="row" id="forwards"></div>

</div>

</div>

</div>

<button onclick="lockTeam()">

Lock Team

</button>

<p id="status"></p>

</div>

<script>

/* PLAYER TO CLUB MAPPING */

const playerTeams = {

  "Saliba": "Arsenal",

  "Gabriel": "Arsenal",

  "Van Dijk": "Liverpool",

  "Walker": "Man City",

  "Trippier": "Newcastle",

  "Romero": "Spurs",

  "Saka": "Arsenal",

  "Palmer": "Chelsea",

  "Salah": "Liverpool",

  "Son": "Spurs",

  "Bowen": "West Ham",

  "Bruno": "Man Utd",

  "Haaland": "Man City",

  "Watkins": "Villa",

  "Isak": "Newcastle",

  "Jackson": "Chelsea",

  "Solanke": "Bournemouth",

  "Darwin": "Liverpool"

};

/* CREATE PLAYER */

function createPlayer(type) {

let options = "";

let players = [];

if (type === "DEF") {

players = ["Saliba", "Gabriel", "Van Dijk", "Walker", "Trippier", "Romero"];

}

if (type === "MID") {

players = ["Saka", "Palmer", "Salah", "Son", "Bowen", "Bruno"];

}

if (type === "FWD") {

players = ["Haaland", "Watkins", "Isak", "Jackson", "Solanke", "Darwin"];

}

options = "<option>Select</option>";

players.forEach(player => {

  options += `<option>${player}</option>`;

});

return `

<div class="player">

<div class="shirt">

<img class="badge" src="badges/premierleague.png">

</div>

<div class="player-name"></div>

<strong>${type}</strong>

<select onchange="updateShirt(this)">

${options}

</select>

</div>

`;

}

/* UPDATE SHIRT */

function updateShirt(select) {

const shirt =

select.parentElement.querySelector(".shirt");

const badge =

select.parentElement.querySelector(".badge");

const value = select.value;

let club;

if (playerTeams[value]) {

  club = playerTeams[value];

} else {

  club = value;

}

const playerNameEl = select.parentElement.querySelector('.player-name');

if (playerNameEl) {

  playerNameEl.innerText = club || '';

}

/* CLUBS */

if (club === "Arsenal") {

shirt.style.background =

"linear-gradient(#ef4444, #991b1b)";

badge.src = "badges/arsenal.png";

}

else if (club === "Chelsea") {

shirt.style.background =

"linear-gradient(#2563eb, #1d4ed8)";

badge.src = "badges/chelsea.png";

}

else if (club === "Liverpool") {

shirt.style.background =

"linear-gradient(#dc2626, #7f1d1d)";

badge.src = "badges/liverpool.png";

}

else if (club === "Villa") {

shirt.style.background =

"linear-gradient(#7c3aed, #5b21b6)";

badge.src = "badges/villa.png";

}

else if (club === "Spurs") {

shirt.style.background =

"linear-gradient(#f8fafc, #94a3b8)";

badge.src = "badges/spurs.png";

}

else if (club === "West Ham") {

shirt.style.background =

"linear-gradient(#7f1d1d, #facc15)";

badge.src = "badges/westham.png";

}

else if (club === "Newcastle") {

shirt.style.background =

"linear-gradient(#111827, #000000)";

badge.src = "badges/newcastle.png";

}

else if (club === "Man City") {

shirt.style.background =

"linear-gradient(#38bdf8, #0284c7)";

badge.src = "badges/mancity.png";

}

else if (club === "Man Utd") {

shirt.style.background =

"linear-gradient(#c1121f, #7a0721)";

badge.src = "badges/manutd.png";

}

else if (club === "Bournemouth") {

shirt.style.background =

"linear-gradient(#d4003a, #640723)";

badge.src = "badges/bournemouth.png";

}

}

/* FORMATION */

function setFormation() {

const formation =

document.getElementById("formation").value;

let def = 4;

let mid = 4;

let fwd = 2;

if (formation === "433") {

def = 4;

mid = 3;

fwd = 3;

}

if (formation === "352") {

def = 3;

mid = 5;

fwd = 2;

}

if (formation === "343") {

def = 3;

mid = 4;

fwd = 3;

}

if (formation === "451") {

def = 4;

mid = 5;

fwd = 1;

}

document.getElementById("defenders").innerHTML =

Array(def).fill().map(() => createPlayer("DEF")).join("");

document.getElementById("midfielders").innerHTML =

Array(mid).fill().map(() => createPlayer("MID")).join("");

document.getElementById("forwards").innerHTML =

Array(fwd).fill().map(() => createPlayer("FWD")).join("");

}

/* SAVE TEAM */

function lockTeam() {

const selects =

document.querySelectorAll("select");

let clubs = [];

for (let select of selects) {

if (select.value === "Select") {

document.getElementById("status").innerText =

"Please complete all selections.";

return;

}

let playerName = select.value;

let club = playerTeams[playerName];

if (clubs.includes(club)) {

document.getElementById("status").innerText =

"Maximum 1 player per club.";

return;

}

clubs.push(club);

}

document.getElementById("status").innerText =

"Team saved successfully!";

}

/* LOAD */

window.onload = function () {

setFormation();

};

</script>

</body>

</html>
