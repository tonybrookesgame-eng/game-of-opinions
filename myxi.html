<!DOCTYPE html>

<html lang="en">

<head>

<title>Your Team - Game of Opinions</title>

<style>

/* =========================

   GLOBAL

========================= */

*{

  box-sizing:border-box;

}

body{

  margin:0;

  font-family:'Segoe UI', Arial, sans-serif;

  color:white;

  overflow-x:hidden;

  background:

    radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 22%),

    linear-gradient(180deg,#020611 0%,#071320 35%,#071a29 100%);

  min-height:100vh;

  position:relative;

}

/* STADIUM BACKGROUND */

body::before{

  content:"";

  position:fixed;

  inset:0;

  background:

    radial-gradient(circle at center, rgba(120,255,120,0.08), transparent 30%),

    radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 25%),

    repeating-radial-gradient(circle at 50% -20%, rgba(255,255,255,0.03) 0px, transparent 80px, transparent 120px);

  pointer-events:none;

}

body::after{

  content:"";

  position:fixed;

  inset:0;

  background-image:

    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),

    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);

  background-size:80px 80px;

  opacity:0.2;

  pointer-events:none;

}

/* =========================

   HEADER

========================= */

header{

  position:sticky;

  top:0;

  z-index:999;

  backdrop-filter:blur(12px);

  background:rgba(5,10,18,0.78);

  border-bottom:1px solid rgba(255,255,255,0.08);

  display:flex;

  justify-content:space-between;

  align-items:center;

  padding:18px 28px;

}

.logo{

  font-size:24px;

  font-weight:800;

  letter-spacing:0.04em;

}

.logo span{

  color:#c7ff38;

}

.mobile-nav{

  display:flex;

  align-items:center;

  gap:18px;

}

.mobile-nav a{

  color:#d9e3f0;

  text-decoration:none;

  font-size:14px;

  transition:0.2s ease;

}

.mobile-nav a:hover{

  color:#c7ff38;

}

/* =========================

   CONTAINER

========================= */

.container{

  max-width:1200px;

  margin:auto;

  padding:40px 24px 100px;

  position:relative;

  z-index:1;

}

.page-top{

  display:flex;

  justify-content:space-between;

  align-items:flex-end;

  flex-wrap:wrap;

  gap:20px;

  margin-bottom:28px;

}

.page-title h1{

  font-size:54px;

  line-height:1;

  margin:0 0 12px;

}

.page-title h1 span{

  color:#c7ff38;

}

.page-title p{

  margin:0;

  color:#c7d2e0;

  font-size:17px;

  max-width:620px;

  line-height:1.6;

}

/* =========================

   FORMATION

========================= */

.formation-block{

  display:flex;

  flex-direction:column;

  gap:8px;

  min-width:210px;

}

.formation-block label{

  font-size:11px;

  text-transform:uppercase;

  letter-spacing:0.14em;

  color:#9fb0c8;

}

#formation{

  background:rgba(255,255,255,0.06);

  border:1px solid rgba(255,255,255,0.08);

  color:white;

  padding:12px 14px;

  border-radius:14px;

  font-size:15px;

  outline:none;

  backdrop-filter:blur(10px);

}

#formation option {

  background: #111827;

  color: white;

}

#formation option:hover {

  background: #c7ff38;

  color: #041102;

}

/* =========================

   STADIUM

========================= */

.stadium-shell{

  position:relative;

  border-radius:38px;

  padding:10px;

  background:

    radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 24%),

    linear-gradient(180deg,#08111c 0%,#030813 100%);

  overflow:hidden;

  box-shadow:

    0 20px 40px rgba(0,0,0,0.3),

    inset 0 1px 0 rgba(255,255,255,0.06);

}

.stadium-shell::before{

  content:"";

  position:absolute;

  inset:0;

  border-radius:38px;

  background:

    radial-gradient(circle at center, transparent 60%, rgba(255,255,255,0.08) 61%, transparent 63%),

    radial-gradient(circle at center, transparent 70%, rgba(255,255,255,0.05) 71%, transparent 73%),

    repeating-linear-gradient(to bottom, transparent 0 4.5px, rgba(255,255,255,0.15) 4.5px 10.5px, transparent 10.5px 15px),

    repeating-linear-gradient(90deg, transparent 0 4.5px, rgba(255,255,255,0.15) 4.5px 10.5px, transparent 10.5px 15px),

    repeating-conic-gradient(

      rgba(230,230,230,0.14) 0deg 6deg,

      rgba(200,200,200,0.10) 6deg 10deg,

      rgba(180,180,180,0.08) 10deg 14deg,

      rgba(220,220,220,0.06) 14deg 24deg

    );

  background-size:100% 100%, 100% 100%, 15px 15px, 15px 15px, 100% 100%;

  opacity:0.78;

  pointer-events:none;

  filter:blur(0.4px);

}

.stadium-shell::after{

  content:"";

  position:absolute;

  inset:12px;

  border-radius:28px;

  box-shadow: inset 0 0 0 2px rgba(255,255,255,0.12);

  pointer-events:none;

}

.stadium-top{

  position:relative;

  z-index:2;

  display:flex;

  justify-content:center;

  gap:10px;

  flex-wrap:wrap;

  margin-bottom:10px;

}

.stadium-banner{

  padding:8px 14px;

  border-radius:999px;

  font-size:11px;

  font-weight:700;

  letter-spacing:0.03em;

  border:1px solid rgba(255,255,255,0.08);

  backdrop-filter:blur(10px);

}

.stadium-banner--title{

  background:#133d77;

  color:white;

  font-size:15px;

  padding:10px 20px;

}

.stadium-banner--quote{

  background:#143e59;

  color:#d9f3ff;

}

/* =========================

   PITCH FRAME

========================= */

.pitch-frame{

  background:#071019;

  border-radius:28px;

  padding:8px;

  border:1px solid rgba(255,255,255,0.08);

}

/* =========================

   PITCH

========================= */

.pitch{

  position:relative;

  overflow:hidden;

  border-radius:24px;

  padding:20px 10px 26px;

  background:

    radial-gradient(circle at center, rgba(255,255,255,0.05), transparent 55%),

    linear-gradient(180deg,#2ca84a 0%,#228d3c 35%,#1d7b34 60%,#16632b 100%);

  box-shadow:

    inset 0 0 120px rgba(0,0,0,0.35),

    inset 0 30px 50px rgba(255,255,255,0.04);

}

/* mowing pattern */

.pitch::after{

  content:"";

  position:absolute;

  inset:0;

  background:

    repeating-linear-gradient(

      to bottom,

      rgba(255,255,255,0.06) 0px,

      rgba(255,255,255,0.06) 24px,

      transparent 24px,

      transparent 48px

    );

  opacity:0.28;

}

/* halfway line */

.pitch::before{

  content:"";

  position:absolute;

  top:50%;

  left:0;

  width:100%;

  height:2px;

  background:rgba(255,255,255,0.15);

}

/* =========================

   PITCH MARKINGS

========================= */

.center-circle{

  position:absolute;

  top:50%;

  left:50%;

  width:110px;

  height:110px;

  border-radius:50%;

  border:2px solid rgba(255,255,255,0.18);

  transform:translate(-50%,-50%);

}

.center-dot{

  position:absolute;

  top:50%;

  left:50%;

  width:10px;

  height:10px;

  background:rgba(255,255,255,0.35);

  border-radius:50%;

  transform:translate(-50%,-50%);

}

.penalty-box{

  position:absolute;

  left:22%;

  width:56%;

  height:120px;

  border:2px solid rgba(255,255,255,0.20);

}

.penalty-top{

  top:16px;

}

.penalty-bottom{

  bottom:16px;

}

.six-yard-box{

  position:absolute;

  left:39%;

  width:22%;

  height:54px;

  border:2px solid rgba(255,255,255,0.20);

}

.six-yard-top{

  top:24px;

}

.six-yard-bottom{

  bottom:24px;

}

/* =========================

   ROWS

========================= */

.row{

  position:relative;

  z-index:2;

  display:flex;

  justify-content:center;

  align-items:flex-end;

  flex-wrap:wrap;

  gap:12px;

  margin:10px 0;

}

/* =========================

   PLAYER CARD

========================= */

.player{

  width:92px;

  background:rgba(0,0,0,0.22);

  border:1px solid rgba(255,255,255,0.12);

  border-radius:20px;

  padding:10px 8px;

  display:flex;

  flex-direction:column;

  align-items:center;

  backdrop-filter:blur(10px);

  transition:0.22s ease;

}

.player:hover{

  transform:translateY(-4px) scale(1.03);

  box-shadow:

    0 16px 26px rgba(0,0,0,0.28);

}

/* =========================

   SHIRT

========================= */

.shirt{

  width:56px;

  height:56px;

  border-radius:18px 18px 24px 24px;

  position:relative;

  background:linear-gradient(#2563eb,#1d4ed8);

  border:1px solid rgba(255,255,255,0.12);

  box-shadow:

    inset 0 2px 6px rgba(255,255,255,0.14),

    0 8px 18px rgba(0,0,0,0.22);

}

.shirt::before,

.shirt::after{

  content:"";

  position:absolute;

  top:10px;

  width:13px;

  height:16px;

  background:inherit;

}

.shirt::before{

  left:-13px;

  border-radius:6px 0 0 6px;

}

.shirt::after{

  right:-13px;

  border-radius:0 6px 6px 0;

}

/* =========================

   PLAYER NAME

========================= */

.player-name{

  margin-top:10px;

  min-height:20px;

  font-size:10px;

  font-weight:700;

  background:rgba(0,0,0,0.42);

  padding:4px 8px;

  border-radius:999px;

  max-width:100%;

  overflow:hidden;

  text-overflow:ellipsis;

  white-space:nowrap;

}

/* =========================

   POSITION

========================= */

.player strong{

  margin-top:6px;

  font-size:10px;

  color:#d3ddeb;

  letter-spacing:0.06em;

}

/* =========================

   SELECT

========================= */

select{

  margin-top:8px;

  width:100%;

  background:#111827;

  color:white;

  border:1px solid rgba(255,255,255,0.08);

  border-radius:10px;

  padding:8px 6px;

  font-size:10px;

  text-align:center;

  outline:none;

}

select:focus{

  border-color:#c7ff38;

}

/* =========================

   BUTTON

========================= */

.button-wrap{

  text-align:center;

}

button{

  margin-top:26px;

  background:#c7ff38;

  color:#041102;

  border:none;

  border-radius:14px;

  padding:16px 30px;

  font-size:16px;

  font-weight:800;

  cursor:pointer;

  transition:0.2s ease;

}

button:hover{

  transform:translateY(-2px) scale(1.02);

}

/* =========================

   STATUS

========================= */

#status{

  text-align:center;

  margin-top:18px;

  font-weight:700;

  color:#7dff9b;

}

/* =========================

   MOBILE

========================= */

@media(max-width:900px){

  .page-title h1{

    font-size:42px;

  }

  .player{

    width:74px;

    padding:8px 6px;

  }

  .shirt{

    width:44px;

    height:44px;

  }

  .shirt::before,

  .shirt::after{

    width:9px;

    height:11px;

  }

  .shirt::before{

    left:-9px;

  }

  .shirt::after{

    right:-9px;

  }

  select{

    font-size:8px;

    padding:6px 4px;

  }

  .row{

    gap:4px;

  }

}

@media(max-width:640px){

  header{

    flex-direction:column;

    gap:14px;

    text-align:center;

  }

  .mobile-nav{

    width:100%;

    justify-content:center;

    flex-wrap:wrap;

  }

  .container{

    padding:26px 14px 90px;

  }

  .page-title h1{

    font-size:34px;

  }

  .page-title p{

    font-size:15px;

  }

  .player{

    width:62px;

  }

  .shirt{

    width:38px;

    height:38px;

  }

  .player-name{

    font-size:8px;

    padding:3px 6px;

  }

  .player strong{

    font-size:8px;

  }

  select{

    font-size:7px;

  }

  .stadium-banner--title{

    font-size:13px;

  }

  button{

    width:100%;

  }

  .row{

    gap:4px;

  }

}

</style>

<script>

/* =========================

const playerTeams = {

/* =========================

   CREATE PLAYER

========================= */

function createPlayer(type){

  let players = [];

  if(type === "DEF"){

    players = [

  "Saliba",

  "Gabriel",

  "White",

  "Van Dijk",

  "Robertson",

  "Alexander-Arnold",

  "Dias",

  "Gvardiol",

  "Akanji",

  "Udogie",

  "Trippier",

  "Burn",

  "Schar",

  "Dalot",

  "Martinez",

  "Konsa",

  "Digne",

  "Colwill",

  "Cucurella",

  "Tarkowski",

  "Kilman",

  "Pinnock",

  "Estupinan",

  "Zabarnyi",

  "Guehi",

  "Robinson",

  "Murillo",

  "Ait-Nouri",

  "Greaves",

  "Faes",

  "Walker"


    ];

  }

  if(type === "MID"){

    players = [

  "Saka",

  "Odegaard",

  "Rice",

  "Salah",

  "Mac Allister",

  "De Bruyne",

  "Foden",

  "Rodri",

    ];

  }

  if(type === "FWD"){

    players = [

  "Haaland",

  "Watkins",

  "Isak",

  "Jackson",

  "Solanke",

  "Darwin",

  "Jesus",

  "Hojlund",

  "Richarlison",

  "Calvert-Lewin",

  "Wissa",

  "Joao Pedro",

  "Mateta",

  "Muniz",

  "Wood",

  "Cunha",

  "Delap",

  "Vardy",

  "Foster"

    ];

  }

  let options = '<option>Select</option>';

  players.forEach(player => {

    options += `<option>${player}</option>`;

  });

  return `

    <div class="player">

      <div class="shirt"></div>

      <div class="player-name"></div>

      <strong>${type}</strong>

      <select onchange="handleSelection(this)">

        ${options}

      </select>

    </div>

  `;

}

/* =========================

   HANDLE SELECTION

========================= */

function handleSelection(select){

  updateShirt(select);

  refreshDropdowns();

}

/* =========================

   REFRESH DROPDOWNS

========================= */

function refreshDropdowns(){

  const selects =

    document.querySelectorAll(".player select");

  let selectedPlayers = [];

  let selectedClubs = [];

  /* GET CURRENT SELECTIONS */

  selects.forEach(select => {

    const player = select.value;

    if(player !== "Select"){

      selectedPlayers.push(player);

      const club = playerTeams[player];

      if(club){

        selectedClubs.push(club);

      }

    }

  });

  /* LOOP THROUGH EVERY DROPDOWN */

  selects.forEach(select => {

    const currentValue = select.value;

    const options = select.querySelectorAll("option");

    options.forEach(option => {

      const player = option.value;

      /* NEVER DISABLE SELECT */

      if(player === "Select"){

        option.disabled = false;

        return;

      }

      const club = playerTeams[player];

      /* RESET */

      option.disabled = false;

      /* PREVENT SAME PLAYER */

      if(

        selectedPlayers.includes(player) &&

        player !== currentValue

      ){

        option.disabled = true;

      }

      /* PREVENT SAME CLUB */

      if(

        selectedClubs.includes(club) &&

        player !== currentValue

      ){

        option.disabled = true;

      }

    });

  });

}

/* =========================

   UPDATE SHIRT

========================= */

function updateShirt(select){

  const shirt =

    select.parentElement.querySelector(".shirt");

  const playerNameEl =

    select.parentElement.querySelector(".player-name");

  const value = select.value;

  let club;

  if(playerTeams[value]){

    club = playerTeams[value];

  }else{

    club = value;

  }

  playerNameEl.innerText = club || "";

  /* DEFAULT */

  shirt.style.background =

    "linear-gradient(#2563eb,#1d4ed8)";

  /* CLUB COLOURS */

  if(club === "Arsenal"){

    shirt.style.background =

      "linear-gradient(#ef4444,#991b1b)";

  }

  else if(club === "Chelsea"){

    shirt.style.background =

      "linear-gradient(#2563eb,#1d4ed8)";

  }

  else if(club === "Liverpool"){

    shirt.style.background =

      "linear-gradient(#dc2626,#7f1d1d)";

  }

  else if(club === "Villa"){

    shirt.style.background =

/* =========================

   FORMATION

========================= */

function setFormation(){

  const formation =

    document.getElementById("formation").value;

  let def = 4;

  let mid = 4;

  let fwd = 2;

  if(formation === "433"){

    mid = 3;

    fwd = 3;

  }

  if(formation === "352"){

    def = 3;

    mid = 5;

  }

  if(formation === "343"){

    def = 3;

    fwd = 3;

  }

  if(formation === "451"){

    mid = 5;

    fwd = 1;

  }

  document.getElementById("defenders").innerHTML =

    Array(def).fill().map(() =>

      createPlayer("DEF")

    ).join("");

  document.getElementById("midfielders").innerHTML =

    Array(mid).fill().map(() =>

      createPlayer("MID")

    ).join("");

  document.getElementById("forwards").innerHTML =

    Array(fwd).fill().map(() =>

      createPlayer("FWD")

    ).join("");

    refreshDropdowns

}

function lockTeam(){

  const selects =

    document.querySelectorAll("select");

  let clubs = [];

  for(let select of selects){

    if(select.value === "Select"){

      document.getElementById("status").innerText =

        "Please complete all selections.";

      return;

    }

    let playerName = select.value;

    let club =

      playerTeams[playerName] || playerName;

    if(clubs.includes(club)){

      document.getElementById("status").innerText =

        "Maximum 1 player per club.";

      return;

    }

    clubs.push(club);

  }

/* =========================

   LOAD

========================= */

window.onload = function(){

  /* LOAD FORMATION */

  const savedFormation =

    localStorage.getItem("formation");

  if(savedFormation){

    document.getElementById("formation").value =

      savedFormation;

  }

  /* BUILD FORMATION */

  setFormation();

  /* LOAD PLAYERS */

  const savedTeam =

    JSON.parse(localStorage.getItem("savedTeam"));

  if(savedTeam){

    const selects =

      document.querySelectorAll(".player select");

    selects.forEach((select,index) => {

      if(savedTeam[index]){

        select.value = savedTeam[index];

        updateShirt(select);

      }

    });

  }

  refreshDropdowns();

};

};
