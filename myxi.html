<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Your Team - Game of Opinions</title>

<style>

/* =========================

   GLOBAL

========================= */

*{

  box-sizing:border-box;

}

body{

  margin:0;

  font-family:'Segoe UI', Arial, sans-serif;

  color:white;

  overflow-x:hidden;

  background:

    radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 22%),

    linear-gradient(180deg,#020611 0%,#071320 35%,#071a29 100%);

  min-height:100vh;

  position:relative;

}

/* STADIUM BACKGROUND */

body::before{

  content:"";

  position:fixed;

  inset:0;

  background:

    radial-gradient(circle at center, rgba(120,255,120,0.08), transparent 30%),

    radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 25%),

    repeating-radial-gradient(circle at 50% -20%, rgba(255,255,255,0.03) 0px, transparent 80px, transparent 120px);

  pointer-events:none;

}

body::after{

  content:"";

  position:fixed;

  inset:0;

  background-image:

    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),

    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);

  background-size:80px 80px;

  opacity:0.2;

  pointer-events:none;

}

/* =========================

   HEADER

========================= */

header{

  position:sticky;

  top:0;

  z-index:999;

  backdrop-filter:blur(12px);

  background:rgba(5,10,18,0.78);

  border-bottom:1px solid rgba(255,255,255,0.08);

  display:flex;

  justify-content:space-between;

  align-items:center;

  padding:18px 28px;

}

.logo{

  font-size:24px;

  font-weight:800;

  letter-spacing:0.04em;

}

.logo span{

  color:#c7ff38;

}

.mobile-nav{

  display:flex;

  align-items:center;

  gap:18px;

}

.mobile-nav a{

  color:#d9e3f0;

  text-decoration:none;

  font-size:14px;

  transition:0.2s ease;

}

.mobile-nav a:hover{

  color:#c7ff38;

}

/* =========================

   CONTAINER

========================= */

.container{

  max-width:1200px;

  margin:auto;

  padding:40px 24px 100px;

  position:relative;

  z-index:1;

}

.page-top{

  display:flex;

  justify-content:space-between;

  align-items:flex-end;

  flex-wrap:wrap;

  gap:20px;

  margin-bottom:28px;

}

.page-title h1{

  font-size:54px;

  line-height:1;

  margin:0 0 12px;

}

.page-title h1 span{

  color:#c7ff38;

}

.page-title p{

  margin:0;

  color:#c7d2e0;

  font-size:17px;

  max-width:620px;

  line-height:1.6;

}

/* =========================

   FORMATION

========================= */

.formation-block{

  display:flex;

  flex-direction:column;

  gap:8px;

  min-width:210px;

}

.formation-block label{

  font-size:11px;

  text-transform:uppercase;

  letter-spacing:0.14em;

  color:#9fb0c8;

}

#formation{

  background:rgba(255,255,255,0.06);

  border:1px solid rgba(255,255,255,0.08);

  color:white;

  padding:12px 14px;

  border-radius:14px;

  font-size:15px;

  outline:none;

  backdrop-filter:blur(10px);

}

/* =========================

   STADIUM

========================= */

.stadium-shell{

  position:relative;

  border-radius:38px;

  padding:18px;

  background:

    radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 24%),

    linear-gradient(180deg,#08111c 0%,#030813 100%);

  border:1px solid rgba(255,255,255,0.08);

  box-shadow:

    0 30px 70px rgba(0,0,0,0.45),

    inset 0 1px 0 rgba(255,255,255,0.06);

}

.stadium-shell::before{

  content:"";

  position:absolute;

  inset:0;

  border-radius:38px;

  background:

    radial-gradient(circle at 50% -10%, rgba(255,255,255,0.06), transparent 35%);

  pointer-events:none;

}

.stadium-top{

  position:relative;

  z-index:2;

  display:flex;

  justify-content:center;

  gap:10px;

  flex-wrap:wrap;

  margin-bottom:18px;

}

.stadium-banner{

  padding:8px 14px;

  border-radius:999px;

  font-size:11px;

  font-weight:700;

  letter-spacing:0.03em;

  border:1px solid rgba(255,255,255,0.08);

  backdrop-filter:blur(10px);

}

.stadium-banner--title{

  background:#133d77;

  color:white;

  font-size:15px;

  padding:10px 20px;

}

.stadium-banner--quote{

  background:#143e59;

  color:#d9f3ff;

}

/* =========================

   PITCH FRAME

========================= */

.pitch-frame{

  background:#071019;

  border-radius:28px;

  padding:12px;

  border:1px solid rgba(255,255,255,0.08);

}

/* =========================

   PITCH

========================= */

.pitch{

  position:relative;

  overflow:hidden;

  border-radius:24px;

  padding:36px 16px 46px;

  background:

    radial-gradient(circle at center, rgba(255,255,255,0.05), transparent 55%),

    linear-gradient(180deg,#2ca84a 0%,#228d3c 35%,#1d7b34 60%,#16632b 100%);

  box-shadow:

    inset 0 0 120px rgba(0,0,0,0.35),

    inset 0 30px 50px rgba(255,255,255,0.04);

}

/* mowing pattern */

.pitch::after{

  content:"";

  position:absolute;

  inset:0;

  background:

    repeating-linear-gradient(

      to bottom,

      rgba(255,255,255,0.06) 0px,

      rgba(255,255,255,0.06) 24px,

      transparent 24px,

      transparent 48px

    );

  opacity:0.28;

}

/* halfway line */

.pitch::before{

  content:"";

  position:absolute;

  top:50%;

  left:0;

  width:100%;

  height:2px;

  background:rgba(255,255,255,0.15);

}

/* =========================

   PITCH MARKINGS

========================= */

.center-circle{

  position:absolute;

  top:50%;

  left:50%;

  width:110px;

  height:110px;

  border-radius:50%;

  border:2px solid rgba(255,255,255,0.18);

  transform:translate(-50%,-50%);

}

.center-dot{

  position:absolute;

  top:50%;

  left:50%;

  width:10px;

  height:10px;

  background:rgba(255,255,255,0.35);

  border-radius:50%;

  transform:translate(-50%,-50%);

}

.penalty-box{

  position:absolute;

  left:22%;

  width:56%;

  height:120px;

  border:2px solid rgba(255,255,255,0.20);

}

.penalty-top{

  top:16px;

}

.penalty-bottom{

  bottom:16px;

}

.six-yard-box{

  position:absolute;

  left:39%;

  width:22%;

  height:54px;

  border:2px solid rgba(255,255,255,0.20);

}

.six-yard-top{

  top:24px;

}

.six-yard-bottom{

  bottom:24px;

}

/* =========================

   ROWS

========================= */

.row{

  position:relative;

  z-index:2;

  display:flex;

  justify-content:center;

  align-items:flex-end;

  flex-wrap:wrap;

  gap:12px;

  margin:18px 0;

}

/* =========================

   PLAYER CARD

========================= */

.player{

  width:92px;

  background:rgba(0,0,0,0.22);

  border:1px solid rgba(255,255,255,0.12);

  border-radius:20px;

  padding:10px 8px;

  display:flex;

  flex-direction:column;

  align-items:center;

  backdrop-filter:blur(10px);

  transition:0.22s ease;

}

.player:hover{

  transform:translateY(-4px) scale(1.03);

  box-shadow:

    0 16px 26px rgba(0,0,0,0.28);

}

/* =========================

   SHIRT

========================= */

.shirt{

  width:56px;

  height:56px;

  border-radius:18px 18px 24px 24px;

  position:relative;

  background:linear-gradient(#2563eb,#1d4ed8);

  border:1px solid rgba(255,255,255,0.12);

  box-shadow:

    inset 0 2px 6px rgba(255,255,255,0.14),

    0 8px 18px rgba(0,0,0,0.22);

}

.shirt::before,

.shirt::after{

  content:"";

  position:absolute;

  top:10px;

  width:13px;

  height:16px;

  background:inherit;

}

.shirt::before{

  left:-13px;

  border-radius:6px 0 0 6px;

}

.shirt::after{

  right:-13px;

  border-radius:0 6px 6px 0;

}

/* =========================

   PLAYER NAME

========================= */

.player-name{

  margin-top:10px;

  min-height:20px;

  font-size:10px;

  font-weight:700;

  background:rgba(0,0,0,0.42);

  padding:4px 8px;

  border-radius:999px;

  max-width:100%;

  overflow:hidden;

  text-overflow:ellipsis;

  white-space:nowrap;

}

/* =========================

   POSITION

========================= */

.player strong{

  margin-top:6px;

  font-size:10px;

  color:#d3ddeb;

  letter-spacing:0.06em;

}

/* =========================

   SELECT

========================= */

select{

  margin-top:8px;

  width:100%;

  background:#111827;

  color:white;

  border:1px solid rgba(255,255,255,0.08);

  border-radius:10px;

  padding:8px 6px;

  font-size:10px;

  text-align:center;

  outline:none;

}

select:focus{

  border-color:#c7ff38;

}

/* =========================

   BUTTON

========================= */

.button-wrap{

  text-align:center;

}

button{

  margin-top:26px;

  background:#c7ff38;

  color:#041102;

  border:none;

  border-radius:14px;

  padding:16px 30px;

  font-size:16px;

  font-weight:800;

  cursor:pointer;

  transition:0.2s ease;

}

button:hover{

  transform:translateY(-2px) scale(1.02);

}

/* =========================

   STATUS

========================= */

#status{

  text-align:center;

  margin-top:18px;

  font-weight:700;

  color:#7dff9b;

}

/* =========================

   MOBILE

========================= */

@media(max-width:900px){

  .page-title h1{

    font-size:42px;

  }

  .player{

    width:74px;

    padding:8px 6px;

  }

  .shirt{

    width:44px;

    height:44px;

  }

  .shirt::before,

  .shirt::after{

    width:9px;

    height:11px;

  }

  .shirt::before{

    left:-9px;

  }

  .shirt::after{

    right:-9px;

  }

  select{

    font-size:8px;

    padding:6px 4px;

  }

  .row{

    gap:8px;

  }

}

@media(max-width:640px){

  header{

    flex-direction:column;

    gap:14px;

    text-align:center;

  }

  .mobile-nav{

    width:100%;

    justify-content:center;

    flex-wrap:wrap;

  }

  .container{

    padding:26px 14px 90px;

  }

  .page-title h1{

    font-size:34px;

  }

  .page-title p{

    font-size:15px;

  }

  .player{

    width:62px;

  }

  .shirt{

    width:38px;

    height:38px;

  }

  .player-name{

    font-size:8px;

    padding:3px 6px;

  }

  .player strong{

    font-size:8px;

  }

  select{

    font-size:7px;

  }

  .stadium-banner--title{

    font-size:13px;

  }

  button{

    width:100%;

  }

}

</style>

</head>

<body>

<header>

  <div class="logo">

    GAME <span>OF OPINIONS</span>

  </div>

  <nav class="mobile-nav">

    <a href="index.html">Home</a>

    <a href="myxi.html">Your Team</a>

    <a href="season.html">Season Picks</a>

    <a href="league.html">League</a>

  </nav>

</header>

<div class="container">

  <div class="page-top">

    <div class="page-title">

      <h1>Your <span>Team</span></h1>

      <p>

        Pick your strongest XI. One player per club.

        Back your football opinions and build the perfect side.

      </p>

    </div>

    <div class="formation-block">

      <label for="formation">Formation</label>

      <select id="formation" onchange="setFormation()">

        <option value="442">4-4-2</option>

        <option value="433">4-3-3</option>

        <option value="352">3-5-2</option>

        <option value="343">3-4-3</option>

        <option value="451">4-5-1</option>

      </select>

    </div>

  </div>

  <div class="stadium-shell">

    <div class="stadium-top">

      <div class="stadium-banner stadium-banner--quote">

        "You Want Some"

      </div>

      <div class="stadium-banner stadium-banner--title">

        Game of Opinions

      </div>

      <div class="stadium-banner stadium-banner--quote">

        "Let's Be Having You"

      </div>

    </div>

    <div class="pitch-frame">

      <div class="pitch">

        <div class="center-circle"></div>

        <div class="center-dot"></div>

        <div class="penalty-box penalty-top"></div>

        <div class="penalty-box penalty-bottom"></div>

        <div class="six-yard-box six-yard-top"></div>

        <div class="six-yard-box six-yard-bottom"></div>

        <!-- GOALKEEPER -->

        <div class="row">

          <div class="player">

            <div class="shirt"></div>

            <div class="player-name"></div>

            <strong>GK</strong>

            <select onchange="updateShirt(this)">

              <option>Select</option>

              <option>Arsenal</option>

              <option>Chelsea</option>

              <option>Liverpool</option>

              <option>Man City</option>

              <option>Villa</option>

              <option>Spurs</option>

              <option>West Ham</option>

              <option>Newcastle</option>

            </select>

          </div>

        </div>

        <!-- DEF -->

        <div class="row" id="defenders"></div>

        <!-- MID -->

        <div class="row" id="midfielders"></div>

        <!-- FWD -->

        <div class="row" id="forwards"></div>

      </div>

    </div>

  </div>

  <div class="button-wrap">

    <button onclick="lockTeam()">

      Lock Team

    </button>

  </div>

  <p id="status"></p>

</div>

<script>

/* =========================

   PLAYER DATA

========================= */

const playerTeams = {

  "Saliba":"Arsenal",

  "Gabriel":"Arsenal",

  "Van Dijk":"Liverpool",

  "Walker":"Man City",

  "Trippier":"Newcastle",

  "Romero":"Spurs",

  "Saka":"Arsenal",

  "Palmer":"Chelsea",

  "Salah":"Liverpool",

  "Son":"Spurs",

  "Bowen":"West Ham",

  "Bruno":"Man Utd",

  "Haaland":"Man City",

  "Watkins":"Villa",

  "Isak":"Newcastle",

  "Jackson":"Chelsea",

  "Solanke":"Bournemouth",

  "Darwin":"Liverpool"

};

/* =========================

   CREATE PLAYER

========================= */

function createPlayer(type){

  let players = [];

  if(type === "DEF"){

    players = [

      "Saliba",

      "Gabriel",

      "Van Dijk",

      "Walker",

      "Trippier",

      "Romero"

    ];

  }

  if(type === "MID"){

    players = [

      "Saka",

      "Palmer",

      "Salah",

      "Son",

      "Bowen",

      "Bruno"

    ];

  }

  if(type === "FWD"){

    players = [

      "Haaland",

      "Watkins",

      "Isak",

      "Jackson",

      "Solanke",

      "Darwin"

    ];

  }

  let options = '<option>Select</option>';

  players.forEach(player => {

    options += `<option>${player}</option>`;

  });

  return `

    <div class="player">

      <div class="shirt"></div>

      <div class="player-name"></div>

      <strong>${type}</strong>

      <select onchange="updateShirt(this)">

        ${options}

      </select>

    </div>

  `;

}

/* =========================

   UPDATE SHIRT

========================= */

function updateShirt(select){

  const shirt =

    select.parentElement.querySelector(".shirt");

  const playerNameEl =

    select.parentElement.querySelector(".player-name");

  const value = select.value;

  let club;

  if(playerTeams[value]){

    club = playerTeams[value];

  }else{

    club = value;

  }

  playerNameEl.innerText = club || "";

  /* DEFAULT */

  shirt.style.background =

    "linear-gradient(#2563eb,#1d4ed8)";

  /* CLUB COLOURS */

  if(club === "Arsenal"){

    shirt.style.background =

      "linear-gradient(#ef4444,#991b1b)";

  }

  else if(club === "Chelsea"){

    shirt.style.background =

      "linear-gradient(#2563eb,#1d4ed8)";

  }

  else if(club === "Liverpool"){

    shirt.style.background =

      "linear-gradient(#dc2626,#7f1d1d)";

  }

  else if(club === "Villa"){

    shirt.style.background =

      "linear-gradient(#7c3aed,#5b21b6)";

  }

  else if(club === "Spurs"){

    shirt.style.background =

      "linear-gradient(#f8fafc,#94a3b8)";

  }

  else if(club === "West Ham"){

    shirt.style.background =

      "linear-gradient(#7f1d1d,#facc15)";

  }

  else if(club === "Newcastle"){

    shirt.style.background =

      "linear-gradient(#111827,#000000)";

  }

  else if(club === "Man City"){

    shirt.style.background =

      "linear-gradient(#38bdf8,#0284c7)";

  }

  else if(club === "Man Utd"){

    shirt.style.background =

      "linear-gradient(#c1121f,#7a0721)";

  }

  else if(club === "Bournemouth"){

    shirt.style.background =

      "linear-gradient(#d4003a,#640723)";

  }

}

/* =========================

   FORMATION

========================= */

function setFormation(){

  const formation =

    document.getElementById("formation").value;

  let def = 4;

  let mid = 4;

  let fwd = 2;

  if(formation === "433"){

    mid = 3;

    fwd = 3;

  }

  if(formation === "352"){

    def = 3;

    mid = 5;

  }

  if(formation === "343"){

    def = 3;

    fwd = 3;

  }

  if(formation === "451"){

    mid = 5;

    fwd = 1;

  }

  document.getElementById("defenders").innerHTML =

    Array(def).fill().map(() =>

      createPlayer("DEF")

    ).join("");

  document.getElementById("midfielders").innerHTML =

    Array(mid).fill().map(() =>

      createPlayer("MID")

    ).join("");

  document.getElementById("forwards").innerHTML =

    Array(fwd).fill().map(() =>

      createPlayer("FWD")

    ).join("");

}

/* =========================

   SAVE TEAM

========================= */

function lockTeam(){

  const selects =

    document.querySelectorAll("select");

  let clubs = [];

  for(let select of selects){

    if(select.value === "Select"){

      document.getElementById("status").innerText =

        "Please complete all selections.";

      return;

    }

    let playerName = select.value;

    let club =

      playerTeams[playerName] || playerName;

    if(clubs.includes(club)){

      document.getElementById("status").innerText =

        "Maximum 1 player per club.";

      return;

    }

    clubs.push(club);

  }

  document.getElementById("status").innerText =

    "Team saved successfully!";

}

/* =========================

   LOAD

========================= */

window.onload = function(){

  setFormation();

};

</script>

</body>

</html>
