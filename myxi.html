<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Your Team - Game of Opinions</title>

<style>

/* =========================

   GLOBAL

========================= */

body {

  background: #0b1020;

  color: white;

  font-family: 'Segoe UI', Arial, sans-serif;

  margin: 0;

  padding-bottom: 90px;

}

/* =========================

   HEADER

========================= */

header {

  display: flex;

  justify-content: space-between;

  align-items: center;

  padding: 20px 40px;

  border-bottom: 1px solid #222;

}

.logo {

  font-size: 24px;

  font-weight: bold;

}

.logo span {

  color: gold;

}

/* =========================

   NAVIGATION

========================= */

.mobile-nav {

  display: flex;

  justify-content: space-around;

  align-items: center;

}

.mobile-nav a {

  color: white;

  text-decoration: none;

  text-align: center;

  font-size: 13px;

  line-height: 1.3;

  transition: 0.2s;

}

.mobile-nav a:hover {

  opacity: 0.7;

}

/* =========================

   CONTAINER

========================= */

.container {

  padding: 40px;

  max-width: 1100px;

  margin: auto;

}

h1 {

  margin-bottom: 10px;

}

p {

  color: #ccc;

}

/* =========================

   FORMATION

========================= */

.formation-block {

  display: flex;

  flex-direction: column;

  gap: 8px;

  max-width: 240px;

  margin-top: 14px;

}

.formation-block label {

  color: #cfd3da;

  font-size: 11px;

  letter-spacing: 0.14em;

  text-transform: uppercase;

}

#formation {

  margin-top: 0;

  width: 100%;

  padding: 10px 32px 10px 12px;

  background: #111827;

  color: white;

  border: 1px solid #333;

  border-radius: 10px;

  text-align: center;

  text-align-last: center;

  appearance: none;

  background-image: linear-gradient(45deg, transparent 50%, #fff 50%), linear-gradient(135deg, #fff 50%, transparent 50%);

  background-position: calc(100% - 12px) calc(50% + 1px), calc(100% - 8px) calc(50% + 1px);

  background-size: 6px 6px;

  background-repeat: no-repeat;

}

/* =========================

   PITCH

========================= */

.stadium {

  padding: 14px;

  border-radius: 40px;

  background: radial-gradient(circle at top, rgba(255,255,255,0.1), transparent 32%), #05121d;

  border: 1px solid rgba(255,255,255,0.08);

  box-shadow: 0 24px 70px rgba(0,0,0,0.55);

  max-width: 840px;

  margin-left: auto;

  margin-right: auto;

  margin-bottom: 24px;

  position: relative;

}

.stadium-banner {

  display: inline-flex;

  justify-content: center;

  align-items: center;

  background: #111c36;

  color: #f8f8f8;

  font-size: 12px;

  font-weight: 700;

  padding: 8px 12px;

  border-radius: 999px;

  letter-spacing: 0.02em;

  text-transform: uppercase;

  box-shadow: 0 6px 16px rgba(0,0,0,0.24);

  margin: 0;

  max-width: 320px;

}

.stadium-top {

  display: flex;

  justify-content: center;

  align-items: center;

  gap: 10px;

  flex-wrap: wrap;

  margin-bottom: 18px;

}

.stadium-banner--title {

  background: #0f3463;

  color: #fff;

  letter-spacing: 0.04em;

  text-transform: none;

  font-size: 16px;

  padding: 10px 22px;

  min-width: 200px;

  text-align: center;

}

.stadium-banner--quote {

  background: #1d6d9c;

  color: #fff;

  letter-spacing: 0.02em;

  text-transform: none;

  font-size: 11px;

  padding: 6px 10px;

}

.pitch-frame {

  padding: 14px;

  border-radius: 32px;

  background: rgba(10, 13, 18, 0.98);

  border: 1px solid rgba(255,255,255,0.08);

  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);

  max-width: 820px;

  margin-left: auto;

  margin-right: auto;

}

.pitch {

  position: relative;

  padding: 12px 0 16px;

  display: flex;

  flex-direction: column;

  gap: 20px;

  background: linear-gradient(180deg, #1f7f33 0%, #18742c 35%, #1b6d2a 60%, #1d7f34 100%);

  overflow: hidden;

}

.pitch::after {

  content: "";

  position: absolute;

  inset: 0;

  background: repeating-linear-gradient(

    to bottom,

    rgba(255,255,255,0.08) 0,

    rgba(255,255,255,0.08) 10px,

    transparent 10px,

    transparent 20px

  );

  opacity: 0.25;

  pointer-events: none;

}

.pitch::before {

  content: "";

  position: absolute;

  top: 50%;

  width: 100%;

  height: 1px;

  background: rgba(255,255,255,0.15);

}

/* Centre circle */

.center-circle {

  position: absolute;

  top: 50%;

  left: 50%;

  width: 110px;

  height: 110px;

  border: 1px solid rgba(255,255,255,0.18);

  border-radius: 50%;

  transform: translate(-50%, -50%);

}

/* Penalty boxes */

.penalty-box {

  position: absolute;

  width: 58%;

  height: 120px;

  border: 2px solid rgba(255,255,255,0.24);

  left: 21%;

  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);

}

.penalty-top {

  top: 18px;

}

.penalty-bottom {

  bottom: 18px;

}

.six-yard-box {

  position: absolute;

  width: 24%;

  height: 54px;

  border: 2px solid rgba(255,255,255,0.24);

  left: 38%;

  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);

}

.six-yard-top {

  top: 28px;

}

.six-yard-bottom {

  bottom: 28px;

}

.goal-line {

  position: absolute;

  width: 28%;

  height: 4px;

  background: rgba(255,255,255,0.95);

  left: 36%;

  border-radius: 2px;

  box-shadow: 0 0 12px rgba(255,255,255,0.18);

}

.goal-top {

  top: 12px;

}

.goal-bottom {

  bottom: 12px;

}

/* =========================

   ROWS

========================= */

.row {

  display: flex;

  justify-content: center;

  align-items: flex-end;

  gap: 12px;

  position: relative;

  z-index: 2;

  flex-wrap: wrap;

}

/* =========================

   PLAYER

========================= */

.player {

  width: 86px;

  text-align: center;

  transition: transform 0.2s ease;

  display: flex;

  flex-direction: column;

  align-items: center;

  gap: 6px;

  padding: 8px 4px 10px;

  border-radius: 18px;

  background: rgba(255,255,255,0.09);

  border: 1px solid rgba(255,255,255,0.12);

}

.player:hover {

  transform: scale(1.02);

}

/* =========================

   SHIRT

========================= */

.shirt {

  width: 62px;

  height: 62px;

  background: linear-gradient(#2563eb, #1d4ed8);

  margin: auto;

  border-radius: 18px 18px 24px 24px;

  position: relative;

  border: 1px solid rgba(255,255,255,0.16);

  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05), 0 6px 14px rgba(0,0,0,0.22);

}

/* Sleeves */

.shirt::before,

.shirt::after {

  content: "";

  position: absolute;

  width: 14px;

  height: 16px;

  background: inherit;

  top: 10px;

}

.shirt::before {

  left: -14px;

  border-radius: 8px 0 0 8px;

}

.shirt::after {

  right: -14px;

  border-radius: 0 8px 8px 0;

}

/* =========================

   BADGES

========================= */

.badge {

  position: absolute;

  top: 36px;

  left: 50%;

  transform: translateX(-50%);

  width: 16px;

  height: 16px;

  object-fit: contain;

}

/* =========================

   PLAYER NAME

========================= */

.player-name {

  font-size: 10px;

  font-weight: 700;

  line-height: 1.1;

  min-height: 24px;

  padding: 3px 8px;

  border-radius: 999px;

  background: rgba(0,0,0,0.42);

  color: white;

  letter-spacing: 0.02em;

  text-align: center;

  white-space: nowrap;

  overflow: hidden;

  text-overflow: ellipsis;

  display: block;

}



/* =========================

   POSITION

========================= */

.player strong {

  display: block;

  margin-top: 6px;

  font-size: 10px;

  color: rgba(255,255,255,0.8);

}

/* =========================

   SELECT

========================= */

select {

  width: 100%;

  margin-top: 6px;

  font-size: 10px;

  background: #111827;

  color: white;

  border: 1px solid rgba(255,255,255,0.08);

  border-radius: 10px;

  padding: 8px 10px 8px 12px;

  box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);

  appearance: none;

  text-align: center;

  text-align-last: center;

  background-image: linear-gradient(45deg, transparent 50%, #fff 50%), linear-gradient(135deg, #fff 50%, transparent 50%);

  background-position: calc(100% - 12px) calc(50% + 1px), calc(100% - 8px) calc(50% + 1px);

  background-size: 6px 6px;

  background-repeat: no-repeat;

}

select:focus {

  outline: none;

  border: 1px solid gold;

}

/* =========================

   BUTTON

========================= */

button {

  margin-top: 30px;

  padding: 14px 24px;

  background: gold;

  color: #111;

  border: none;

  border-radius: 12px;

  font-weight: bold;

  letter-spacing: 0.02em;

  cursor: pointer;

  transition: transform 0.2s ease, box-shadow 0.2s ease;

}

button:hover {

  transform: translateY(-1px);

  box-shadow: 0 10px 20px rgba(0,0,0,0.18);

}

/* =========================

   STATUS

========================= */

#status {

  margin-top: 15px;

  color: #4ade80;

}

/* =========================

   MOBILE

========================= */

@media (max-width: 768px) {

  header {

    padding: 16px;

    flex-direction: column;

    gap: 12px;

    text-align: center;

  }

  .container {

    padding: 16px 16px 90px;

  }

  h1 {

    font-size: 26px;

    text-align: center;

  }

  p {

    text-align: center;

  }

  .stadium {

    padding: 10px;

  }

  .stadium-top {

    flex-direction: column;

    align-items: center;

    gap: 8px;

    margin-bottom: 12px;

  }

  .stadium-banner {

    width: 100%;

    max-width: 100%;

    justify-content: center;

    font-size: 10px;

    padding: 6px 10px;

  }

  .stadium-banner--title {

    font-size: 14px;

    padding: 8px 12px;

    min-width: auto;

  }

  .stadium-banner--quote {

    font-size: 9px;

    padding: 5px 10px;

  }

  .pitch-frame {

    padding: 10px;

  }

  .pitch {

    padding: 18px 10px 14px;

    gap: 16px;

  }

  .row {

    gap: 10px;

  }

  .player {

    width: 74px;

    padding: 8px 5px 10px;

  }

  .shirt {

    width: 48px;

    height: 48px;

  }

  .shirt::before,

  .shirt::after {

    width: 9px;

    height: 12px;

    top: 9px;

  }

  .shirt::before {

    left: -9px;

  }

  .shirt::after {

    right: -9px;

  }

  .badge {

    width: 10px;

    height: 10px;

    top: 30px;

  }

  .player-name {

    font-size: 9px;

    min-height: 20px;

    padding: 2px 6px;

    white-space: nowrap;

    overflow: hidden;

    text-overflow: ellipsis;

  }

  .formation-block {

    max-width: 220px;

    width: 100%;

    margin: 0 auto 14px;

  }

  #formation {

    padding-right: 28px;

  }

  select {

    width: 100%;

    font-size: 8px;

    padding: 6px 8px;

  }

  .player strong {

    font-size: 8px;

  }

  button {

    width: 100%;

  }

  .mobile-nav {

    position: fixed;

    bottom: 0;

    left: 0;

    width: 100%;

    background: #111827;

    padding: 10px 0;

    border-top: 1px solid #333;

    z-index: 999;

  }

}

</style>

</head>

<body>

<header>

<div class="logo">

GAME <span>OF OPINIONS</span>

</div>

<nav class="mobile-nav">

<a href="index.html">🏠<br>Home</a>

<a href="myxi.html">⚽<br>Team</a>

<a href="season.html">🏆<br>Picks</a>

<a href="league.html">📊<br>League</a>

</nav>

</header>

<div class="container">

<h1>Your Team</h1>

<p>

Select 11 players. Maximum 1 player per club.

</p>

<div class="formation-block">

  <label for="formation">Formation</label>

  <select id="formation" onchange="setFormation()">

    <option value="442">4-4-2</option>

    <option value="433">4-3-3</option>

    <option value="352">3-5-2</option>

    <option value="343">3-4-3</option>

    <option value="451">4-5-1</option>

  </select>

</div>

<div class="stadium">

  <div class="stadium-top">

    <div class="stadium-banner stadium-banner--quote">"You Want Some"</div>

    <div class="stadium-banner stadium-banner--title">Game of Opinions</div>

    <div class="stadium-banner stadium-banner--quote">"Lets Be Having You"</div>

  </div>

  <div class="pitch-frame">

    <div class="pitch">

      <div class="center-circle"></div>

      <div class="goal-line goal-top"></div>

      <div class="goal-line goal-bottom"></div>

      <div class="penalty-box penalty-top"></div>

      <div class="six-yard-box six-yard-top"></div>

      <div class="penalty-box penalty-bottom"></div>

      <div class="six-yard-box six-yard-bottom"></div>

<!-- GOALKEEPER -->

<div class="row">

<div class="player">

<div class="shirt">

<img class="badge" src="badges/premierleague.png">

</div>

<div class="player-name"></div>

<strong>GK</strong>

<select onchange="updateShirt(this)">

<option>Select</option>

<option>Arsenal</option>

<option>Chelsea</option>

<option>Liverpool</option>

<option>Man City</option>

<option>Villa</option>

<option>Spurs</option>

<option>West Ham</option>

<option>Newcastle</option>

</select>

</div>

</div>

<!-- DEF -->

<div class="row" id="defenders"></div>

<!-- MID -->

<div class="row" id="midfielders"></div>

<!-- FWD -->

<div class="row" id="forwards"></div>

</div>

</div>

</div>

<button onclick="lockTeam()">

Lock Team

</button>

<p id="status"></p>

</div>

<script>

/* PLAYER TO CLUB MAPPING */

const playerTeams = {

  "Saliba": "Arsenal",

  "Gabriel": "Arsenal",

  "Van Dijk": "Liverpool",

  "Walker": "Man City",

  "Trippier": "Newcastle",

  "Romero": "Spurs",

  "Saka": "Arsenal",

  "Palmer": "Chelsea",

  "Salah": "Liverpool",

  "Son": "Spurs",

  "Bowen": "West Ham",

  "Bruno": "Man Utd",

  "Haaland": "Man City",

  "Watkins": "Villa",

  "Isak": "Newcastle",

  "Jackson": "Chelsea",

  "Solanke": "Bournemouth",

  "Darwin": "Liverpool"

};

/* CREATE PLAYER */

function createPlayer(type) {

let options = "";

let players = [];

if (type === "DEF") {

players = ["Saliba", "Gabriel", "Van Dijk", "Walker", "Trippier", "Romero"];

}

if (type === "MID") {

players = ["Saka", "Palmer", "Salah", "Son", "Bowen", "Bruno"];

}

if (type === "FWD") {

players = ["Haaland", "Watkins", "Isak", "Jackson", "Solanke", "Darwin"];

}

options = "<option>Select</option>";

players.forEach(player => {

  options += `<option>${player}</option>`;

});

return `

<div class="player">

<div class="shirt">

<img class="badge" src="badges/premierleague.png">

</div>

<div class="player-name"></div>

<strong>${type}</strong>

<select onchange="updateShirt(this)">

${options}

</select>

</div>

`;

}

/* UPDATE SHIRT */

function updateShirt(select) {

const shirt =

select.parentElement.querySelector(".shirt");

const badge =

select.parentElement.querySelector(".badge");

const value = select.value;

let club;

if (playerTeams[value]) {

  club = playerTeams[value];

} else {

  club = value;

}

const playerNameEl = select.parentElement.querySelector('.player-name');

if (playerNameEl) {

  playerNameEl.innerText = club || '';

}

/* CLUBS */

if (club === "Arsenal") {

shirt.style.background =

"linear-gradient(#ef4444, #991b1b)";

badge.src = "badges/arsenal.png";

}

else if (club === "Chelsea") {

shirt.style.background =

"linear-gradient(#2563eb, #1d4ed8)";

badge.src = "badges/chelsea.png";

}

else if (club === "Liverpool") {

shirt.style.background =

"linear-gradient(#dc2626, #7f1d1d)";

badge.src = "badges/liverpool.png";

}

else if (club === "Villa") {

shirt.style.background =

"linear-gradient(#7c3aed, #5b21b6)";

badge.src = "badges/villa.png";

}

else if (club === "Spurs") {

shirt.style.background =

"linear-gradient(#f8fafc, #94a3b8)";

badge.src = "badges/spurs.png";

}

else if (club === "West Ham") {

shirt.style.background =

"linear-gradient(#7f1d1d, #facc15)";

badge.src = "badges/westham.png";

}

else if (club === "Newcastle") {

shirt.style.background =

"linear-gradient(#111827, #000000)";

badge.src = "badges/newcastle.png";

}

else if (club === "Man City") {

shirt.style.background =

"linear-gradient(#38bdf8, #0284c7)";

badge.src = "badges/mancity.png";

}

else if (club === "Man Utd") {

shirt.style.background =

"linear-gradient(#c1121f, #7a0721)";

badge.src = "badges/manutd.png";

}

else if (club === "Bournemouth") {

shirt.style.background =

"linear-gradient(#d4003a, #640723)";

badge.src = "badges/bournemouth.png";

}

}

/* FORMATION */

function setFormation() {

const formation =

document.getElementById("formation").value;

let def = 4;

let mid = 4;

let fwd = 2;

if (formation === "433") {

def = 4;

mid = 3;

fwd = 3;

}

if (formation === "352") {

def = 3;

mid = 5;

fwd = 2;

}

if (formation === "343") {

def = 3;

mid = 4;

fwd = 3;

}

if (formation === "451") {

def = 4;

mid = 5;

fwd = 1;

}

document.getElementById("defenders").innerHTML =

Array(def).fill().map(() => createPlayer("DEF")).join("");

document.getElementById("midfielders").innerHTML =

Array(mid).fill().map(() => createPlayer("MID")).join("");

document.getElementById("forwards").innerHTML =

Array(fwd).fill().map(() => createPlayer("FWD")).join("");

}

/* SAVE TEAM */

function lockTeam() {

const selects =

document.querySelectorAll("select");

let clubs = [];

for (let select of selects) {

if (select.value === "Select") {

document.getElementById("status").innerText =

"Please complete all selections.";

return;

}

let playerName = select.value;

let club = playerTeams[playerName];

if (clubs.includes(club)) {

document.getElementById("status").innerText =

"Maximum 1 player per club.";

return;

}

clubs.push(club);

}

document.getElementById("status").innerText =

"Team saved successfully!";

}

/* LOAD */

window.onload = function () {

setFormation();

};

</script>

</body>

</html>
