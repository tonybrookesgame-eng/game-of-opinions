<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Your Team - Game of Opinions</title>

<style>

/* =========================

GLOBAL + BACKGROUND

========================= */

*{box-sizing:border-box;}

body{

  margin:0;

  font-family:'Segoe UI', Arial, sans-serif;

  color:white;

  overflow-x:hidden;

  background:

    radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 25%),

    linear-gradient(180deg,#020611 0%,#071320 40%,#071a29 100%);

}

/* stadium glow layers */

body::before{

  content:"";

  position:fixed;

  inset:0;

  background:

    radial-gradient(circle at center, rgba(120,255,120,0.08), transparent 40%),

    repeating-radial-gradient(circle at 50% -20%, rgba(255,255,255,0.03) 0px, transparent 80px, transparent 120px);

  pointer-events:none;

}

body::after{

  content:"";

  position:fixed;

  inset:0;

  background-image:

    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),

    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);

  background-size:80px 80px;

  opacity:0.2;

  pointer-events:none;

}

/* =========================

HEADER

========================= */

header{

  display:flex;

  justify-content:space-between;

  padding:20px 40px;
  backdrop-filter:blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.08);

}

.logo{

  font-size:22px;

  font-weight:800;

}

.logo span{

  color:#c7ff38;

}

nav a{

  margin-left: 20px;
  color: white;
  text-decoration:none;

}

nav a:hover{

  opacity: 0.8;

}

/* =========================

LAYOUT

========================= */

.container{

  max-width: 1080px;

  margin:auto;

  padding: 40px;
}
h1 {
  margin-bottom: 8px;
  font-size: 36px;
}
p {
  color: #ccc; /* Consistent with season.html */
  margin-bottom: 24px;
  line-height: 1.7;
  max-width: 700px;
}

.main-layout{

  display:flex;

  gap: 30px;

  align-items: flex-start;

}

.left-side{

  flex: 2;

}

.weekly-panel{

  flex:1;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px;
  padding: 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.14);
  backdrop-filter: blur(12px);
}

.weekly-panel h2 {
  margin: 0 0 14px; /* Consistent with season.html .summary-card h2 */
  font-size: 18px; /* Consistent with season.html .summary-card h2 */
  color: #f8fafc; /* Consistent with season.html .summary-card h2 */
}

/* =========================

STADIUM SHELL

========================= */

.stadium-shell{

  border-radius:30px;

  padding:12px;

  background:

    radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 25%),

    linear-gradient(180deg,#08111c 0%,#030813 100%);

  box-shadow:0 20px 50px rgba(0,0,0,0.4);

}

/* =========================

PITCH

========================= */

.pitch-frame{

  background:#071019;

  border-radius:24px;

  padding:10px;

}

.pitch{

  position:relative;

  border-radius:20px;

  padding:30px 10px;

  display:flex;

  flex-direction:column;

  gap:18px;

  background:

    radial-gradient(circle at center, rgba(255,255,255,0.05), transparent 55%),

    linear-gradient(180deg,#2ca84a 0%,#228d3c 40%,#16632b 100%);

}

/* mowing stripes */

.pitch::after{

  content:"";

  position:absolute;

  inset:0;

  background:

    repeating-linear-gradient(

      to bottom,

      rgba(255,255,255,0.06) 0px,

      rgba(255,255,255,0.06) 24px,

      transparent 24px,

      transparent 48px

    );

  opacity:0.3;

}

/* halfway line */

.pitch::before{

  content:"";

  position:absolute;

  top:50%;

  width:100%;

  height:2px;

  background:rgba(255,255,255,0.2);

}

/* =========================

PITCH MARKINGS

========================= */

.center-circle{

  position:absolute;

  top:50%;

  left:50%;

  width:110px;

  height:110px;

  border-radius:50%;

  border:2px solid rgba(255,255,255,0.2);

  transform:translate(-50%,-50%);

}

.center-dot{

  position:absolute;

  top:50%;

  left:50%;

  width:8px;

  height:8px;

  background:white;

  border-radius:50%;

  transform:translate(-50%,-50%);

}

/* =========================

ROWS + PLAYERS

========================= */

.row{
  display:flex;
  justify-content:center;
  gap:12px;
  z-index:2;

}

.player{

  width: 85px;
  text-align: center;
  background: rgba(255,255,255,0.04); /* Consistent with season.html .card */
  border: 1px solid rgba(255,255,255,0.08); /* Consistent with season.html .card */
  border-radius: 18px; /* Consistent with season.html .card */
  padding: 10px; /* Kept for player card size */
  box-shadow: 0 10px 30px rgba(0,0,0,0.14); /* Consistent with season.html .card */
  backdrop-filter: blur(12px); /* Consistent with season.html .card */
  transition: transform 0.2s ease; /* Consistent with season.html .card */
}
.player:hover {
  transform: translateY(-3px); /* Consistent with season.html .card */
  border-color: rgba(255,255,255,0.16); /* Consistent with season.html .card */
}

.shirt{

  width:50px;

  height:50px;

  margin:auto;

  border-radius:14px;

  background:linear-gradient(#2563eb,#1d4ed8);

  position: relative;

}

.shirt::before,

.shirt::after {

  content: "";

  position: absolute;

  width: 10px;

  height: 12px;

  background: inherit;

  top: 6px;

}

.shirt::before {

  left: -9px;

  border-radius: 4px 0 0 4px;

}

.shirt::after {

  right: -9px;

  border-radius: 0 4px 4px 0;

}

.shirt-name {
  position: absolute;
  top: 15px;
  left: 50%;
  transform: translateX(-50%);
  background: #000;
  color: #fff;
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 11px;
  font-weight: 900;
  text-transform: uppercase;
  pointer-events: none;
  display: none;
}

select {
  width: 100%;
  padding: 10px 12px;
  background: rgba(11,16,32,0.9);
  color: white;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  outline: none;
  font-size: 13px;
  cursor: pointer;
}

.pitch .player select {
  padding: 8px 6px;
  font-size: 12px;
}

/* =========================

BUTTON

========================= */

button{

  background: #c7ff38;
  color: #041102;
  padding: 14px;
  width: 100%;
  border-radius: 999px;

  border:none;

  font-weight: 800;
  font-size: 15px;
  cursor:pointer;
  transition: 0.2s ease;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(199,255,56,0.25);
}

#weeklyStatus{

  margin-top:10px;

  color:#7dff9b;

}

.pitch-actions {
  display: flex;
  gap: 12px;
  margin-top: 20px;
}
.pitch-actions button {
  flex: 1;
  width: auto;
}
.btn-clear {
  background: #f87171 !important;
  color: white !important;
}

.mobile-nav {
  /* Hide by default on desktop to prevent "weird text" */
  display: none;
}

/* =========================

MOBILE

========================= */

@media(max-width:768px){ /* Consistent with season.html and league.html */


  nav {
    display: none;
  }

  .container {
    padding: 20px 8px 100px;
  }

  .stadium-shell {
    padding: 8px;
    border-radius: 20px;
  }

  .pitch-frame {
    padding: 5px;
  }

  .pitch {
    padding: 20px 5px;
    gap: 12px;
  }

  .row {
    gap: 5px;
  }

  .player {
    width: 72px;
    padding: 8px 4px;
    text-align: center;
  }

  .shirt {
    width: 38px;
    height: 38px;
  }

  .shirt::before, .shirt::after {
    width: 8px;
    height: 10px;
    top: 5px;
  }

  .shirt-name {
    top: 11px;
    font-size: 9px;
  }

  .pitch .player select {
    font-size: 9px;
    padding: 5px 2px;
  }

  .mobile-nav {
    display: flex;
    justify-content: space-around;
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: #111827;
    padding: 10px 0;
    border-top: 1px solid #333;
     z-index: 1000; /* Ensure it stays on top */
  }

  .mobile-nav a {
    text-decoration: none;
    color: white;
    font-size: 12px;
    text-align: center;
    margin-left: 0;
  }

  .main-layout{

    flex-direction:column;

  }

}

</style>

</head>

    { name: "Cunha", club: "Wolves" }, { name: "Larsen", club: "Wolves" }
  ]
};

const playerToClub = {};
Object.values(playersByPos).flat().forEach(p => { if(typeof p === 'object') playerToClub[p.name] = p.club; });

function updateShirt(select) {
  const shirt = select.parentElement.querySelector('.shirt');
  const nameLabel = shirt.querySelector('.shirt-name');
  const val = select.value;
  if (val === "Select") {
    shirt.style.background = "linear-gradient(#2563eb, #1d4ed8)";
    nameLabel.innerText = "";
    nameLabel.style.display = "none";
    return;
  }
  nameLabel.style.display = "block";
  const team = playerToClub[val] || val;
  nameLabel.innerText = clubAbbr[team] || team.substring(0,3).toUpperCase();
  const colors = {
    "Arsenal": "linear-gradient(#ef4444, #991b1b)",
    "Aston Villa": "linear-gradient(#94bee5, #670e36)",
    "Bournemouth": "linear-gradient(#da291c, #000000)",
    "Brentford": "linear-gradient(#e30613, #ffffff)",
    "Brighton": "linear-gradient(#0057b8, #ffffff)",
    "Chelsea": "linear-gradient(#034694, #002d72)",
    "Crystal Palace": "linear-gradient(#1b458f, #c4122e)",
    "Everton": "linear-gradient(#003399, #002060)",
    "Fulham": "linear-gradient(#ffffff, #000000)",
    "Ipswich": "linear-gradient(#0055a5, #ffffff)",
    "Leicester": "linear-gradient(#003090, #ffffff)",
    "Liverpool": "linear-gradient(#c8102e, #8d0514)",
    "Man City": "linear-gradient(#6cabdd, #1c2c5b)",
    "Man Utd": "linear-gradient(#da291c, #000000)",
    "Newcastle": "linear-gradient(#241f20, #ffffff)",
    "Nott'm Forest": "linear-gradient(#dd0000, #ffffff)",
    "Southampton": "linear-gradient(#d71920, #ffffff)",
    "Spurs": "linear-gradient(#ffffff, #132257)",
    "West Ham": "linear-gradient(#7a263a, #1bb1e7)",
    "Wolves": "linear-gradient(#fdb913, #231f20)"
  };
  shirt.style.background = colors[team] || "linear-gradient(#2563eb, #1d4ed8)";
  refreshDropdowns();
}

function refreshDropdowns() {
  const selects = document.querySelectorAll('.pitch select');
  const selectedClubs = Array.from(selects)
    .map(s => playerToClub[s.value] || s.value)
    .filter(club => club && club !== "Select");

  selects.forEach(select => {
    const currentClub = playerToClub[select.value] || select.value;
    Array.from(select.options).forEach(opt => {
      if (opt.value === "Select") return;
      const optClub = playerToClub[opt.value] || opt.value;
      opt.disabled = selectedClubs.includes(optClub) && optClub !== currentClub;
    });
  });
}

function populatePlayers() {
  const selects = document.querySelectorAll('.pitch .player select');
  selects.forEach(s => {
    const pos = s.dataset.pos;
    if (pos && playersByPos[pos]) {
      playersByPos[pos].forEach(p => {
        let opt = document.createElement('option');
        if (typeof p === 'string') {
          opt.value = p;
          opt.innerHTML = p;
        } else {
          opt.value = p.name;
          opt.innerHTML = p.name;
        }
        s.appendChild(opt);
      });
    }
  });
}

function populateWeeklyOptions() {
  const clubSelect = document.getElementById('firstScorer');
  const minuteSelect = document.getElementById('goalMinute');

  // Populate Clubs using the GK list
  playersByPos.GK.forEach(club => {
    let opt = document.createElement('option');
    opt.value = club;
    opt.innerHTML = club;
    clubSelect.appendChild(opt);
  });

  // Populate Minutes 1-90
  for (let i = 1; i <= 90; i++) {
    let opt = document.createElement('option');
    opt.value = i;
    opt.innerHTML = i;
    minuteSelect.appendChild(opt);
  }
  let otherOpt = document.createElement('option');
  otherOpt.value = "Other";
  otherOpt.innerHTML = "Other (90+)";
  minuteSelect.appendChild(otherOpt);
}

function clearTeam() {
  if (confirm("Are you sure you want to clear your entire team?")) {
    const selects = document.querySelectorAll('.pitch select');
    selects.forEach(select => {
      select.value = "Select";
      updateShirt(select);
    });
  }
}

function saveTeam() {
  const selects = document.querySelectorAll('.pitch select');
  const teamValues = Array.from(selects).map(s => s.value);
  
  if (teamValues.includes("Select")) {
    alert("Please fill all 11 positions first!");
    return;
  }
  localStorage.setItem("myTeam", JSON.stringify(teamValues));
  alert("Team XI Saved!");
}

function saveWeekly(){

  const data = {

    first:firstScorer.value,

    minute:goalMinute.value

  };

  localStorage.setItem("weekly",JSON.stringify(data));

  weeklyStatus.innerText="Saved!";

}

window.onload=function(){
  populatePlayers();
  populateWeeklyOptions();

  const savedTeam = JSON.parse(localStorage.getItem("myTeam"));
  if(savedTeam) {
    const selects = document.querySelectorAll('.pitch select');
    selects.forEach((s, i) => {
      if(savedTeam[i] && savedTeam[i] !== "Select") {
        s.value = savedTeam[i];
        updateShirt(s);
      }
    });
  }

  const saved=JSON.parse(localStorage.getItem("weekly"));

  if(saved){

    firstScorer.value=saved.first;

    goalMinute.value=saved.minute;

  }

};

</script>
